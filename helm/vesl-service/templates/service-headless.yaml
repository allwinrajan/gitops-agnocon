# Headless service — required by StatefulSet for stable pod DNS.
# Pods become: vesl-service-0.vesl-service.freeswitch.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vesl-service.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "vesl-service.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "vesl-service.selectorLabels" . | nindent 4 }}
  ports:
    - name: esl
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
    {{- range .Values.service.additionalPorts }}
    - name: {{ .name }}
      port: {{ .port }}
      targetPort: {{ .targetPort }}
      protocol: {{ .protocol }}
    {{- end }}
