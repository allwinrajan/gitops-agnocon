replicaCount: 2

namespace: freeswitch

fullnameOverride: "vesl-service"

image:
  repository: agnocon/agnoshinimages
  tag: vesl-service-staging-v1.0.0
  pullPolicy: Always
  pullSecrets:
    - name: regcred

# Consul
consul:
  # KV fetch (startup.sh)
  url:   "https://consul-server.consul.svc.cluster.local:8501"
  token: "693c91b6-88d9-87b2-3331-e6025c8f2cb8"

  # Consul Connect inject (Envoy sidecar)
  connectInject: true

  # The name this service is registered under in Consul.
  serviceName: "vesl-service"

  # ServiceAccount — MUST match serviceName (Consul webhook enforces this).
  serviceAccountName: "vesl-service"

  # Availability zone tag written into Consul service metadata.
  zone: "ZONE-1"

  # All app ports excluded from Envoy transparent proxy.
  excludeInboundPorts:  "8085,3000,5000,8021"
  excludeOutboundPorts: "8085,3000,5000,8021"

# StatefulSet
statefulset:
  serviceName: vesl-service
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  terminationGracePeriodSeconds: 15

# Trust Store — Certificate mounting from nats-secret-vesl
trustStore:
  enabled: true
  secretName: nats-secret-vesl
  secretKey: ca.crt
  mountPath: /etc/certs/truststore
  certFileName: ca.crt

# Multus / MacVLAN (feature flag)
multus:
  enabled: true
  networkAttachmentDefinition: macvlan-esl-service

# Init containers
initContainers:
  fixRouting:
    image: busybox:1.36
    imagePullPolicy: IfNotPresent

  waitForNetwork:
    image: busybox:1.36
    imagePullPolicy: IfNotPresent
    waitTimeout: 30
    checkInterval: 2

# Service
service:
  type: ClusterIP
  port: 8085
  targetPort: 8085
  additionalPorts:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
    - name: nats-http
      port: 5000
      targetPort: 5000
      protocol: TCP

resources:
  requests:
    cpu: "2"
    memory: "2Gi"
  limits:
    cpu: "2.5"
    memory: "2560Mi"

persistence:
  enabled: false
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  mountPath: /var/recordings/queue

recordingVolume:
  enabled: false
  mountPath: "/var/recordings/queue"
  type: hostPath
  hostPath: "/var/recordings/queue"

healthCheck:
  enabled: false
  path: /health
  livenessProbe:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}

# DNS — belt-and-suspenders for multi-node MacVLAN environments
dnsPolicy: None
dnsConfig:
  nameservers:
    - 10.96.0.10
  searches:
    - freeswitch.svc.cluster.local
    - svc.cluster.local
    - cluster.local
  options:
    - name: ndots
      value: "5"
    - name: use-vc
