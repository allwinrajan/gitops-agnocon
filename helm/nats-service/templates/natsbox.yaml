{{- if .Values.natsBox.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats-box
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/component: nats-box
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/name: nats
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: nats-box
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/name: nats
  template:
    metadata:
      labels:
        app.kubernetes.io/component: nats-box
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/name: nats
    spec:
      enableServiceLinks: false
      containers:
      - name: nats-box
        image: "{{ .Values.natsBox.image.repository }}:{{ .Values.natsBox.image.tag }}"
        imagePullPolicy: {{ .Values.natsBox.image.pullPolicy }}
        command:
        - sh
        - -ec
        - |
          work_dir="$(pwd)"
          mkdir -p "$XDG_CONFIG_HOME/nats"
          cd "$XDG_CONFIG_HOME/nats"
          if ! [ -s context ]; then
            ln -s /etc/nats-contexts context
          fi
          if ! [ -f context.txt ]; then
            echo -n "default" > context.txt
          fi
          cd "$work_dir"
          exec /entrypoint.sh "$@"
        - --
        args:
        - sh
        - -ec
        - trap true INT TERM; sleep infinity & wait
        volumeMounts:
        - name: contexts
          mountPath: /etc/nats-contexts
        {{- if .Values.tls.enabled }}
        - name: tls-certs
          mountPath: /etc/nats-certs
          readOnly: true
        {{- end }}
        resources:
          {{- toYaml .Values.natsBox.resources | nindent 10 }}
      volumes:
      - name: contexts
        secret:
          secretName: nats-box-contexts
      {{- if .Values.tls.enabled }}
      - name: tls-certs
        secret:
          secretName: {{ .Values.tls.secretName }}
      {{- end }}
{{- end }}
