apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "workspace-service.fullname" . }}-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "workspace-service.labels" . | nindent 4 }}
  annotations:
    description: "Startup script for workspace-service"

data:
  startup.sh: |
{{ .Files.Get "configs/startup.sh" | indent 4 }}
