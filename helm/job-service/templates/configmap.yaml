apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "job-service.fullname" . }}-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "job-service.labels" . | nindent 4 }}
data:
  # startup.sh is the only thing this ConfigMap needs to provide.
  # It fetches all values from Consul KV under job-service/ and
  # writes /app/.env directly. The app reads .env — not process.env.
  startup.sh: |
{{ .Files.Get "configs/startup.sh" | indent 4 }}
