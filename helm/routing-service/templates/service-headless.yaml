# Headless service — required by StatefulSet for stable pod DNS.
# Pods become: routing-service-0.routing-service.freeswitch.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: {{ include "freeswitch-dialplan.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "freeswitch-dialplan.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "freeswitch-dialplan.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
