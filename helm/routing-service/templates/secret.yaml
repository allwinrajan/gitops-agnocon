# All secrets (MYSQL_PASSWORD, tokens, etc.) are fetched at runtime from
# Consul KV by startup.sh and written into /app/.env inside the pod.
# This Secret is intentionally empty — nothing sensitive lives in Helm values.
#
# If you need to add a K8s-native secret (e.g. for imagePullSecrets or
# NODE_EXTRA_CA_CERTS), add it here. Do NOT put Consul KV values here.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "freeswitch-dialplan.fullname" . }}-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "freeswitch-dialplan.labels" . | nindent 4 }}
type: Opaque
stringData: {}
