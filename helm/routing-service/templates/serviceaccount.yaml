{{- if .Values.consul.serviceName }}
# =============================================================================
# ServiceAccount — routing-service
# =============================================================================
# Used by the consul-tag-patcher init container which needs GET/PATCH on pods
# to confirm pod identity before calling the Consul HTTP API directly.
# No Envoy sidecar — registration is done via direct HTTP API (TTL check).
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.consul.serviceAccountName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "freeswitch-dialplan.labels" . | nindent 4 }}
---
# =============================================================================
# Role — pod-annotation-patcher
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "freeswitch-dialplan.fullname" . }}-pod-patcher
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "freeswitch-dialplan.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "patch"]
---
# =============================================================================
# RoleBinding — bind the Role to the ServiceAccount
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "freeswitch-dialplan.fullname" . }}-pod-patcher
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "freeswitch-dialplan.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "freeswitch-dialplan.fullname" . }}-pod-patcher
subjects:
  - kind: ServiceAccount
    name: {{ .Values.consul.serviceAccountName }}
    namespace: {{ .Values.namespace }}
{{- end }}
