apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "freeswitch.labels" . | nindent 4 }}
    {{- with .Values.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  serviceName: {{ .Values.service.name }}
  podManagementPolicy: {{ .Values.statefulset.podManagementPolicy }}
  updateStrategy:
    {{- toYaml .Values.statefulset.updateStrategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "freeswitch.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "freeswitch.selectorLabels" . | nindent 8 }}
        {{- with .Values.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- if .Values.multus.enabled }}
        k8s.v1.cni.cncf.io/networks: {{ .Values.multus.networkAttachmentDefinition | quote }}
        {{- end }}

        {{- if .Values.consul.enabled }}
        # Consul Connect sidecar injection — Envoy handles health checks over
        # eth0 (pod network). Works on any node regardless of MacVLAN topology.
        # transparent-proxy disabled so SIP/ESL/WSS traffic bypasses Envoy entirely.
        # Envoy only listens on port 20000 for kubelet probes (over eth0).
        consul.hashicorp.com/connect-inject:         "true"
        consul.hashicorp.com/transparent-proxy:      "false"
        consul.hashicorp.com/connect-service:        {{ .Values.consul.serviceName | quote }}
        consul.hashicorp.com/transparent-proxy-exclude-inbound-ports:  {{ .Values.consul.excludeInboundPorts | quote }}
        consul.hashicorp.com/transparent-proxy-exclude-outbound-ports: {{ .Values.consul.excludeOutboundPorts | quote }}
        # Placeholder annotations — consul-tag-patcher init container overwrites
        # these with the live Multus IP before Consul Connect reads them.
        consul.hashicorp.com/service-meta-multus_ip:   "pending"
        consul.hashicorp.com/service-meta-multus_name: {{ .Values.multus.networkAttachmentDefinition | quote }}
        consul.hashicorp.com/service-meta-zone:        {{ .Values.consul.zone | quote }}
        consul.hashicorp.com/service-meta-role:        "freeswitch"
        {{- end }}

        {{- with .Values.annotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}

    spec:
      terminationGracePeriodSeconds: {{ .Values.statefulset.terminationGracePeriodSeconds }}
      serviceAccountName: {{ .Values.consul.serviceAccountName }}

      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}

      dnsPolicy: {{ .Values.dnsPolicy }}
      {{- with .Values.dnsConfig }}
      dnsConfig:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      initContainers:
        # ────────────────────────────────────────────────────────────────────────
        # CRITICAL MULTUS FIX: Sofia must bind ONLY to Multus IP, not pod IP
        # Issue: sofia status was showing 10.244.x.x (pod IP) instead of
        #        192.168.9.x (Multus IP)
        # Fix: startup.sh now DEPLOYS rendered vars.xml with Multus IP binding
        # ────────────────────────────────────────────────────────────────────────

        # Step 1 — fix routing:
        #   a) Cluster CIDRs via eth0 so consul-connect-inject-init and Envoy
        #      sidecar can reach consul-server and K8s API.
        #   b) Policy routing table 100: FROM eth0 IP → reply via eth0.
        #      Fixes Envoy readiness probe i/o timeout (pod stuck at 1/2).
        #   c) Policy routing table 200: Multus traffic exits via net1.
        #      CRITICAL for multi-node ESL connections (prevents EPIPE).
        {{- include "freeswitch.fixRouting" . | nindent 8 }}

        # Step 2 — patch pod annotations with live Multus (MacVLAN) IP.
        # Consul Connect reads these when registering so service-meta shows
        # the correct MacVLAN address for routing engine lookups.
        {{- if .Values.consul.enabled }}
        {{- include "freeswitch.consulTagPatcher" . | nindent 8 }}
        {{- end }}

        # Step 3 — confirm MacVLAN interface is fully up before FreeSWITCH starts
        - name: wait-for-network
          image: {{ .Values.initContainers.waitForNetwork.image }}
          imagePullPolicy: {{ .Values.initContainers.waitForNetwork.imagePullPolicy }}
          command:
            - sh
            - -c
            - |
              for i in $(seq 1 {{ .Values.initContainers.waitForNetwork.waitTimeout }}); do
                if ip addr show | grep -E "net1|eth1"; then
                  echo "[wait-for-network] Multus interface found"; ip addr show; exit 0
                fi
                echo "[wait-for-network] Attempt $i — waiting {{ .Values.initContainers.waitForNetwork.checkInterval }}s..."
                sleep {{ .Values.initContainers.waitForNetwork.checkInterval }}
              done
              echo "[wait-for-network] WARNING: Multus not found, continuing anyway"
              exit 0

      containers:
        - name: freeswitch
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/bash", "{{ .Values.configMap.mountPath }}/startup.sh"]
          ports:
            - name: sip
              containerPort: {{ .Values.freeswitch.ports.sip.port }}
              protocol: {{ .Values.freeswitch.ports.sip.protocol }}
            - name: sip-alt
              containerPort: {{ .Values.freeswitch.ports.sipAlt.port }}
              protocol: {{ .Values.freeswitch.ports.sipAlt.protocol }}
            - name: esl
              containerPort: {{ .Values.freeswitch.ports.esl.port }}
              protocol: {{ .Values.freeswitch.ports.esl.protocol }}
            - name: wss
              containerPort: {{ .Values.freeswitch.ports.wss.port }}
              protocol: {{ .Values.freeswitch.ports.wss.protocol }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: CONSUL_HTTP_ADDR
              value: "{{ .Values.consul.url }}"
            - name: CONSUL_HTTP_TOKEN
              value: "{{ .Values.consul.token }}"
            # KV key path — startup.sh reads ALL runtime config from this single blob
            - name: FS_CONSUL_KV_KEY
              value: "{{ .Values.consul.kvKey }}"
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            exec:
              command: [sh, -c, "pgrep -x freeswitch > /dev/null"]
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          # ─── Container-level security context ─────────────────────────────
          # privileged, capabilities, allowPrivilegeEscalation, runAsUser/Group
          # applied only to the freeswitch container — NOT inherited by
          # Consul-injected containers (consul-connect-inject-init, consul-dataplane)
          # which enforce their own non-root policy.
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: freeswitch-startup
              mountPath: {{ .Values.configMap.mountPath }}/startup.sh
              subPath: startup.sh
              readOnly: true
            - name: admin-backend-service-cert
              mountPath: {{ .Values.adminBackend.tlsCertMountPath }}
              subPath: {{ .Values.adminBackend.tlsCertSubPath }}
              readOnly: true
            - name: freeswitch-startup
              mountPath: {{ .Values.configMap.mountPath }}/templates/vars.xml.template
              subPath: vars.xml.template
              readOnly: true
            - name: freeswitch-startup
              mountPath: {{ .Values.configMap.mountPath }}/templates/xml_curl.conf.xml.template
              subPath: xml_curl.conf.xml.template
              readOnly: true
            - name: freeswitch-startup
              mountPath: {{ .Values.configMap.mountPath }}/templates/acl.conf.xml.template
              subPath: acl.conf.xml.template
              readOnly: true
            - name: freeswitch-startup
              mountPath: {{ .Values.configMap.mountPath }}/templates/http_cache.conf.xml.template
              subPath: http_cache.conf.xml.template
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: freeswitch-data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            {{- if .Values.recordingVolume.enabled }}
            - name: recordings
              mountPath: {{ .Values.recordingVolume.mountPath }}
            {{- end }}

      volumes:
        - name: freeswitch-startup
          configMap:
            name: {{ .Values.configMap.name }}
            defaultMode: 0755
        - name: admin-backend-service-cert
          secret:
            secretName: {{ .Values.adminBackend.tlsSecretName }}
        {{- if .Values.recordingVolume.enabled }}
        - name: recordings
          {{- if eq .Values.recordingVolume.type "pvc" }}
          persistentVolumeClaim:
            claimName: {{ .Values.recordingVolume.claimName }}
          {{- else }}
          hostPath:
            path: {{ .Values.recordingVolume.hostPath }}
            type: DirectoryOrCreate
          {{- end }}
        {{- end }}

  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: freeswitch-data
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode }}
        {{- with .Values.persistence.storageClass }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}

