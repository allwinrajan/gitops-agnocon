# PodDisruptionBudget — ensures at least 2 MySQL pods remain available
# during voluntary disruptions (node drain, rolling update).
# With minAvailable=2 and 3 pods total, only 1 pod can be disrupted at a time.
# This preserves GR majority (2/3) so auto-failover remains possible.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "mysql.name" . }}-pdb
  namespace: {{ include "mysql.namespace" . }}
  labels:
    {{- include "mysql.labels" . | nindent 4 }}
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: mysql
