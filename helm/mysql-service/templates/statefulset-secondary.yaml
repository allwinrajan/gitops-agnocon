          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: config-rw
              mountPath: /etc/mysql/conf.d
            - name: config-ro
              mountPath: /mnt/mysql-config
              readOnly: true
            - name: scripts
              mountPath: /scripts

      volumes:
        - name: config-rw
          emptyDir: {}
        - name: config-ro
          configMap:
            name: {{ include "mysql.name" . }}-config
            defaultMode: 0444
        - name: scripts
          configMap:
            name: {{ include "mysql.name" . }}-scripts
            defaultMode: 0755

  # PVC — matches existing data-mysql-cluster-secondary-1-0 (15Gi)
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.storage.storageClass | quote }}
        resources:
          requests:
            storage: {{ .Values.storage.size }}
