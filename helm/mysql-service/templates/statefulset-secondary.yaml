      initContainers:
        {{- include "mysql.fixRouting" . | nindent 8 }}

      containers:
        - name: mysql
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["bash", "/scripts/entrypoint.sh"]
          env:
