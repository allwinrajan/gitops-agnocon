apiVersion: v1
kind: Service
metadata:
  name: {{ include "admin-app-api.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "admin-app-api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "admin-app-api.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
