---
# ==============================================================================
# ConfigMap: postgres-cluster-config
# postgresql.conf — PostgreSQL server configuration
# pg_hba.conf     — host-based authentication rules
# ==============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "postgres.name" . }}-config
  namespace: {{ include "postgres.namespace" . }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
data:
  postgresql.conf: |
    # Connection
    listen_addresses = '*'
    port = {{ .Values.postgresPort }}
    max_connections = {{ .Values.postgresConfig.maxConnections }}

    # Memory
    shared_buffers = {{ .Values.postgresConfig.sharedBuffers }}
    effective_cache_size = {{ .Values.postgresConfig.effectiveCacheSize }}

    # WAL / Replication
    wal_level = {{ .Values.postgresConfig.walLevel }}
    max_wal_senders = {{ .Values.postgresConfig.maxWalSenders }}
    max_replication_slots = {{ .Values.postgresConfig.maxReplicationSlots }}
    hot_standby = {{ .Values.postgresConfig.hotStandby }}
    wal_keep_size = {{ .Values.postgresConfig.walKeepSize }}

    # Logging
    log_destination = 'stderr'
    logging_collector = off
    log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
    log_connections = on
    log_disconnections = on
    log_duration = off
    log_min_duration_statement = 1000

    # Performance
    checkpoint_completion_target = 0.9
    default_statistics_target = 100
    {{- if .Values.timescaledb.enabled }}

    # TimescaleDB — MUST be in shared_preload_libraries for the extension to load
    shared_preload_libraries = 'timescaledb'
    {{- end }}

  pg_hba.conf: |
    # TYPE  DATABASE        USER            ADDRESS                 METHOD
    local   all             all                                     trust
    host    all             all             127.0.0.1/32            {{ .Values.network.authMethod }}
    host    all             all             ::1/128                 {{ .Values.network.authMethod }}
    {{- range .Values.network.allowedCIDRs }}
    # {{ .cidr }}
    host    {{ join "," .databases }}    all    {{ .cidr }}    {{ $.Values.network.authMethod }}
    {{- end }}
    # Streaming replication
    {{- range .Values.network.allowedCIDRs }}
    {{- if .replication }}
    host    replication    replicator    {{ .cidr }}    {{ $.Values.network.authMethod }}
    {{- end }}
    {{- end }}

---
# ==============================================================================
# ConfigMap: postgres-cluster-scripts
# entrypoint.sh  — init data dir, create users/db, start postgres
# standby-init.sh — pg_basebackup from primary, configure recovery
# liveness.sh    — pg_isready check
# readiness.sh   — connection check
# ==============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "postgres.name" . }}-scripts
  namespace: {{ include "postgres.namespace" . }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
data:
  entrypoint.sh: |
    #!/bin/bash
    set -euo pipefail

    PGDATA="/var/lib/postgresql/data/pgdata"
    CONF_SRC="/mnt/postgres-config"
    PG_PORT="{{ .Values.postgresPort }}"
    PG_USER="postgres"
    PG_DB="{{ .Values.defaultDatabase }}"

    mkdir -p "$PGDATA"
    chown -R postgres:postgres /var/lib/postgresql/data 2>/dev/null || true

    echo "[entrypoint] POD_ROLE=${POD_ROLE:-unknown}"

    # ── Standby: delegate to standby-init.sh ─────────────────────────────────
    if [ "${POD_ROLE:-primary}" = "standby" ]; then
      echo "[entrypoint] Standby mode — delegating to standby-init.sh"
      exec bash /scripts/standby-init.sh
    fi

    # ── Primary: initialize if fresh PVC ─────────────────────────────────────
    if [ ! -f "${PGDATA}/PG_VERSION" ]; then
      echo "[entrypoint] Fresh PVC — running initdb..."
      gosu postgres initdb \
        --pgdata="$PGDATA" \
        --auth-host=md5 \
        --auth-local=trust \
        --username="$PG_USER" \
        --encoding=UTF8 \
        --locale=C
      echo "[entrypoint] initdb complete."
    else
      echo "[entrypoint] Existing data dir found — skipping initdb."
    fi

    # Copy config files
    echo "[entrypoint] Copying postgresql.conf and pg_hba.conf..."
    cp "${CONF_SRC}/postgresql.conf" "${PGDATA}/postgresql.conf"
    cp "${CONF_SRC}/pg_hba.conf"     "${PGDATA}/pg_hba.conf"
    chown postgres:postgres "${PGDATA}/postgresql.conf" "${PGDATA}/pg_hba.conf"

    # Start postgres temporarily to create users/db
    echo "[entrypoint] Starting PostgreSQL (temp) for user/db creation..."
    gosu postgres pg_ctl start \
      -D "$PGDATA" \
      -o "-p $PG_PORT -c listen_addresses=127.0.0.1" \
      -w -t 60

    # Set superuser password
    echo "[entrypoint] Setting postgres password..."
    gosu postgres psql -p "$PG_PORT" -U postgres -c \
      "ALTER USER postgres WITH PASSWORD '${POSTGRES_PASSWORD}';" || true

    # Create replication user (always needed even in standalone mode for config consistency)
    echo "[entrypoint] Creating replication user..."
    gosu postgres psql -p "$PG_PORT" -U postgres -c \
      "DO \$\$ BEGIN
         IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname='replicator') THEN
           CREATE ROLE replicator WITH REPLICATION LOGIN PASSWORD '${POSTGRES_REPLICATION_PASSWORD}';
         END IF;
       END \$\$;" || true

    # Create application database
    echo "[entrypoint] Creating database ${PG_DB}..."
    gosu postgres psql -p "$PG_PORT" -U postgres -c \
      "SELECT 1 FROM pg_database WHERE datname='${PG_DB}'" | grep -q 1 || \
      gosu postgres createdb -p "$PG_PORT" -U postgres "$PG_DB"

    {{- if .Values.timescaledb.enabled }}
    # Initialize TimescaleDB extension — PRIMARY ONLY.
    # Standbys receive the extension automatically via streaming replication;
    # running CREATE EXTENSION on a standby would error (read-only replica).
    echo "[entrypoint] Initializing TimescaleDB extension in ${PG_DB}..."
    gosu postgres psql -p "$PG_PORT" -U postgres -d "$PG_DB" -c \
      "CREATE EXTENSION IF NOT EXISTS timescaledb CASCADE;" || true
    echo "[entrypoint] TimescaleDB extension ready."
    {{- end }}

    # Create application users
    {{- range .Values.users }}
    echo "[entrypoint] Creating user {{ .name }}..."
    gosu postgres psql -p "$PG_PORT" -U postgres -c \
      "DO \$\$ BEGIN
         IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname='{{ .name }}') THEN
           CREATE USER {{ .name }} WITH PASSWORD '${USER_{{ .name | upper }}_PASSWORD}';
         ELSE
           ALTER USER {{ .name }} WITH PASSWORD '${USER_{{ .name | upper }}_PASSWORD}';
         END IF;
       END \$\$;" || true
    gosu postgres psql -p "$PG_PORT" -U postgres -c \
      "GRANT ALL PRIVILEGES ON DATABASE ${PG_DB} TO {{ .name }};" || true
    {{- end }}

    # Stop temp instance, restart for full network access
    echo "[entrypoint] Stopping temp instance..."
    gosu postgres pg_ctl stop -D "$PGDATA" -m fast -w

    echo "[entrypoint] Starting PostgreSQL (production)..."
    exec gosu postgres postgres -D "$PGDATA" -p "$PG_PORT"

  standby-init.sh: |
    #!/bin/bash
    set -euo pipefail

    PGDATA="/var/lib/postgresql/data/pgdata"
    CONF_SRC="/mnt/postgres-config"
    PG_PORT="{{ .Values.postgresPort }}"
    PRIMARY_FQDN="{{ include "postgres.primaryFQDN" . }}"

    mkdir -p /var/lib/postgresql/data
    chown -R postgres:postgres /var/lib/postgresql/data 2>/dev/null || true

    if [ ! -f "${PGDATA}/PG_VERSION" ]; then
      echo "[standby-init] Fresh PVC — running pg_basebackup from primary..."

      # Wait for primary to be ready
      RETRIES=60
      until gosu postgres pg_isready -h "$PRIMARY_FQDN" -p "$PG_PORT" -U postgres; do
        RETRIES=$((RETRIES-1))
        if [ "$RETRIES" -le 0 ]; then
          echo "[standby-init] ERROR: primary not ready after 60 attempts — exiting"
          exit 1
        fi
        echo "[standby-init] Waiting for primary ($RETRIES retries left)..."
        sleep 5
      done

      echo "[standby-init] Primary is ready — starting pg_basebackup..."
      PGPASSWORD="${POSTGRES_REPLICATION_PASSWORD}" gosu postgres pg_basebackup \
        -h "$PRIMARY_FQDN" \
        -p "$PG_PORT" \
        -U replicator \
        -D "$PGDATA" \
        -Fp -Xs -P -R

      echo "[standby-init] pg_basebackup complete."
    else
      echo "[standby-init] Existing data dir found — skipping pg_basebackup."
    fi

    # Apply config
    echo "[standby-init] Copying postgresql.conf and pg_hba.conf..."
    cp "${CONF_SRC}/postgresql.conf" "${PGDATA}/postgresql.conf"
    cp "${CONF_SRC}/pg_hba.conf"     "${PGDATA}/pg_hba.conf"

    # Ensure standby.signal exists (PostgreSQL 12+ hot standby trigger)
    touch "${PGDATA}/standby.signal"

    # Write primary_conninfo into postgresql.auto.conf
    cat > "${PGDATA}/postgresql.auto.conf" <<EOF
    primary_conninfo = 'host=${PRIMARY_FQDN} port=${PG_PORT} user=replicator password=${POSTGRES_REPLICATION_PASSWORD} application_name=${POD_NAME}'
    EOF

    chown postgres:postgres \
      "${PGDATA}/postgresql.conf" \
      "${PGDATA}/pg_hba.conf" \
      "${PGDATA}/postgresql.auto.conf" \
      "${PGDATA}/standby.signal"

    echo "[standby-init] Starting standby PostgreSQL..."
    exec gosu postgres postgres -D "$PGDATA" -p "$PG_PORT"

  liveness.sh: |
    #!/bin/bash
    pg_isready -U postgres -p {{ .Values.postgresPort }} -q && exit 0 || exit 1

  readiness.sh: |
    #!/bin/bash
    pg_isready -U postgres -p {{ .Values.postgresPort }} -q || exit 1
    # On standbys, verify hot_standby is active
    if [ "${POD_ROLE:-primary}" = "standby" ]; then
      psql -U postgres -p {{ .Values.postgresPort }} -c "SELECT pg_is_in_recovery();" | grep -q "t" || exit 1
    fi
    exit 0