---
# ==============================================================================
# StatefulSet: redis-sentinel  (pods: redis-sentinel-{0,1,2})
#
# 3 Sentinels, quorum 2 — standard production HA.
# Sentinels use eth0 only (no Multus) — Consul/Envoy handles their routing.
# Sentinels do NOT register with Consul (they are internal infra, not services).
#
# Sentinel config is copied from ConfigMap to writable /tmp/sentinel.conf
# at startup because Sentinel rewrites its own config file on every failover
# (to persist the new master address). The ConfigMap mount is read-only.
#
# wait-for-primary init container: Sentinel must not start before the primary
# is reachable. If Sentinel starts and immediately cannot reach the primary it
# declares it down and triggers an unnecessary election.
#
# resolve-hostnames + announce-hostnames (in sentinel.conf):
# After failover, Sentinel broadcasts the new master's FQDN to all other
# Sentinels and replicas. Replicas reconnect by FQDN (stable across pod
# restarts) rather than by IP (changes every pod restart).
# ==============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-sentinel
  namespace: {{ include "redis.namespace" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
    app.kubernetes.io/component: sentinel
spec:
  serviceName: {{ include "redis.headlessSvc" . }}
  replicas: {{ .Values.sentinel.replicas }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: redis-sentinel
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: redis-sentinel
      annotations:
        {{- if and .Values.multus.sentinel.enabled .Values.multus.sentinel.nadName }}
        k8s.v1.cni.cncf.io/networks: {{ .Values.multus.sentinel.nadName | quote }}
        {{- end }}
    spec:
      terminationGracePeriodSeconds: 15

      initContainers:
        # ── Wait for primary to be reachable before starting Sentinel ──────────
        # Uses nc (netcat) from busybox — lightweight, no Redis client needed.
        # If primary is not up within 3 minutes, Sentinel starts anyway
        # (it will keep retrying internally) to avoid blocking the StatefulSet.
        - name: wait-for-primary
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              PRIMARY="{{ include "redis.primaryFQDN" . }}"
              echo "[wait-for-primary] waiting for $PRIMARY:6379..."
              for i in $(seq 1 60); do
                if nc -z "$PRIMARY" 6379 2>/dev/null; then
                  echo "[wait-for-primary] primary is up on attempt $i"
                  exit 0
                fi
                echo "[wait-for-primary] attempt $i/60 — retrying in 3s..."
                sleep 3
              done
              echo "[wait-for-primary] WARNING: primary not reachable after 3 min — starting Sentinel anyway"
              exit 0

      containers:
        - name: sentinel
          image: {{ .Values.image.redis }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              # Copy ConfigMap (read-only) to writable /tmp/sentinel.conf.
              # Sentinel rewrites this file on every failover — it MUST be writable.
              cp /etc/sentinel-readonly/sentinel.conf /tmp/sentinel.conf
              chmod 644 /tmp/sentinel.conf
              echo "[sentinel] config loaded, starting redis-sentinel..."
              exec redis-sentinel /tmp/sentinel.conf
          ports:
            - name: sentinel
              containerPort: {{ .Values.sentinel.port }}
              protocol: TCP
          {{- if .Values.probes.enabled }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -p {{ .Values.sentinel.port }} PING | grep -q PONG
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds:       {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds:      {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold:    {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  redis-cli -p {{ .Values.sentinel.port }} \
                    SENTINEL masters | grep -q "{{ .Values.sentinel.masterName }}"
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds:       {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds:      {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold:    {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources.sentinel | nindent 12 }}
          volumeMounts:
            - name: sentinel-config-ro
              mountPath: /etc/sentinel-readonly
              readOnly: true

      volumes:
        - name: sentinel-config-ro
          configMap:
            name: sentinel-config
