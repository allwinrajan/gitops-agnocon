# ============================================
# templates/secret.yaml
# ============================================
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rustfs.fullname" . }}-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "rustfs.labels" . | nindent 4 }}
type: Opaque
stringData:
  rootUser: {{ .Values.rustfs.rootUser | quote }}
  rootPassword: {{ .Values.rustfs.rootPassword | quote }}