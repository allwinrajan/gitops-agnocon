{{- if .Values.consul.serviceName }}
# =============================================================================
# ServiceAccount — rustfs
# =============================================================================
# Used by the consul-tag-patcher init container to PATCH pod annotations with
# the live Multus IP. Consul Connect reads these annotations when registering
# the service so service-meta shows the correct MacVLAN address.
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.consul.serviceAccountName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "rustfs.labels" . | nindent 4 }}
---
# =============================================================================
# Role — pod-patcher
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "rustfs.fullname" . }}-pod-patcher
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "rustfs.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "patch"]
---
# =============================================================================
# RoleBinding
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "rustfs.fullname" . }}-pod-patcher
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "rustfs.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "rustfs.fullname" . }}-pod-patcher
subjects:
  - kind: ServiceAccount
    name: {{ .Values.consul.serviceAccountName }}
    namespace: {{ .Values.namespace }}
{{- end }}
