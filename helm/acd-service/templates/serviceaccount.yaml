{{- if .Values.consul.serviceName }}
# =============================================================================
# ServiceAccount — acd-service
# =============================================================================
# Used by the consul-tag-patcher init container.
# No Envoy sidecar — registration is done via direct Consul HTTP API.
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.consul.serviceAccountName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "acd-service.labels" . | nindent 4 }}
---
# =============================================================================
# Role — pod-patcher
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "acd-service.fullname" . }}-pod-patcher
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "acd-service.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "patch"]
---
# =============================================================================
# RoleBinding
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "acd-service.fullname" . }}-pod-patcher
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "acd-service.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "acd-service.fullname" . }}-pod-patcher
subjects:
  - kind: ServiceAccount
    name: {{ .Values.consul.serviceAccountName }}
    namespace: {{ .Release.Namespace }}
{{- end }}
