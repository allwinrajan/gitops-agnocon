apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "admin-app-ui.fullname" . }}-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "admin-app-ui.labels" . | nindent 4 }}
data:
  # startup.sh is the only file this ConfigMap needs to provide.
  # It fetches all VITE_ values from Consul KV under admin-frontend/
  # and writes /app/.env before the app starts.
  startup.sh: |
{{ .Files.Get "configs/startup.sh" | indent 4 }}
