apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "watchdog.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "watchdog.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "watchdog.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "watchdog.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}

        {{- if .Values.multus.enabled }}
        k8s.v1.cni.cncf.io/networks: {{ .Values.multus.networkAttachmentDefinition }}
        {{- end }}

        {{- if .Values.consul.enabled }}
        consul.hashicorp.com/connect-inject:         "true"
        consul.hashicorp.com/transparent-proxy:      "false"
        consul.hashicorp.com/connect-service:        {{ .Values.consul.serviceName | quote }}
        consul.hashicorp.com/transparent-proxy-exclude-inbound-ports:  {{ .Values.consul.excludeInboundPorts | quote }}
        consul.hashicorp.com/transparent-proxy-exclude-outbound-ports: {{ .Values.consul.excludeOutboundPorts | quote }}
        consul.hashicorp.com/service-meta-multus_ip:   "pending"
        consul.hashicorp.com/service-meta-multus_name: {{ .Values.multus.networkAttachmentDefinition | quote }}
        consul.hashicorp.com/service-meta-zone:        {{ .Values.consul.zone | quote }}
        consul.hashicorp.com/service-meta-role:        "watchdog"
        {{- end }}

    spec:
      terminationGracePeriodSeconds: 15

      {{- if .Values.consul.enabled }}
      serviceAccountName: {{ .Values.consul.serviceAccountName }}
      {{- end }}

      dnsPolicy: {{ .Values.dnsPolicy }}

      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      initContainers:
        # Step 1 — fix routing:
        #   a) Cluster CIDRs via eth0 so Envoy sidecar reaches consul-server.
        #   b) Policy table 100 — eth0 IP replies via eth0 (fixes port 20000 probe).
        #   c) Policy table 200 — preserve LAN → MacVLAN net1 routing.
        {{- include "watchdog.fixRouting" . | nindent 8 }}

        # Step 2 — patch pod annotations with the live Multus IP.
        # Consul Connect reads these when registering so service-meta is correct.
        {{- if .Values.consul.enabled }}
        {{- include "watchdog.consulTagPatcher" (dict "nadName" .Values.multus.networkAttachmentDefinition "port" (toString .Values.service.port) "ctx" .) | nindent 8 }}
        {{- end }}

      containers:
        - name: watchdog
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "watchdog.fullname" . }}-config
            - secretRef:
                name: {{ include "watchdog.fullname" . }}-secret
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: CONSUL_URL
              value: {{ .Values.consul.url | quote }}
            - name: CONSUL_TOKEN
              value: {{ .Values.consul.token | quote }}
            - name: CONSUL_ZONE
              value: {{ .Values.consul.zone | quote }}
            - name: MULTUS_NAD
              value: {{ .Values.multus.networkAttachmentDefinition | quote }}
          {{- if .Values.healthCheck.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.healthCheck.path }}
              port: {{ .Values.service.port }}
            initialDelaySeconds: {{ .Values.healthCheck.livenessProbe.initialDelaySeconds }}
            periodSeconds:       {{ .Values.healthCheck.livenessProbe.periodSeconds }}
            timeoutSeconds:      {{ .Values.healthCheck.livenessProbe.timeoutSeconds }}
            failureThreshold:    {{ .Values.healthCheck.livenessProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.healthCheck.path }}
              port: {{ .Values.service.port }}
            initialDelaySeconds: {{ .Values.healthCheck.readinessProbe.initialDelaySeconds }}
            periodSeconds:       {{ .Values.healthCheck.readinessProbe.periodSeconds }}
            timeoutSeconds:      {{ .Values.healthCheck.readinessProbe.timeoutSeconds }}
            failureThreshold:    {{ .Values.healthCheck.readinessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.resources }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
