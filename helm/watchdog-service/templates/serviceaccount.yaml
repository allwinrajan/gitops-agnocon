{{- if .Values.consul.connectInject }}
# =============================================================================
# ServiceAccount — watchdog
# =============================================================================
# Used by:
#   1. consul-tag-patcher init container — needs PATCH on pods to write
#      Multus IP into Consul annotations before the Envoy sidecar is injected.
#   2. Consul connect-inject webhook — needs GET on the pod to read
#      annotations when deciding how to build the Envoy bootstrap config.
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.consul.serviceAccountName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "watchdog.labels" . | nindent 4 }}
---
# =============================================================================
# Role — pod-annotation-patcher
# =============================================================================
# Minimum permissions for the consul-tag-patcher init container.
# Only covers pods in this namespace — no cluster-wide access.
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "watchdog.fullname" . }}-pod-patcher
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "watchdog.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "patch"]
---
# =============================================================================
# RoleBinding — bind the Role to the ServiceAccount
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "watchdog.fullname" . }}-pod-patcher
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "watchdog.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "watchdog.fullname" . }}-pod-patcher
subjects:
  - kind: ServiceAccount
    name: {{ .Values.consul.serviceAccountName }}
    namespace: {{ .Values.namespace }}
{{- end }}
