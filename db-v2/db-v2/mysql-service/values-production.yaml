# mysql-service — values-production.yaml
# ─────────────────────────────────────────────────────────────────────────────
# TARGET CLUSTER: 2 nodes × 1 CPU × 2.4 GB RAM each
#   controlplane  172.30.1.2  (runs k8s system pods ~700MB overhead)
#   node01        172.30.2.2  (runs workloads primarily)
#
# MEMORY BUDGET — MySQL Group Replication (3 pods, one chart at a time):
#   mysqld RSS at idle with innodb_buffer_pool=96M:  ~320 MB
#   GR XCOM / paxos overhead:                        ~60 MB
#   Peak spike during GR join + initial sync:        ~120 MB
#   Safe per-pod limit:                              700 Mi
#   3 pods × 700 Mi = 2.1 GB spread across 2 nodes  → fits with headroom
#
# OOM ROOT CAUSE (previous run): secondaries were limited to 384 Mi / 768 Mi.
#   mysqld + GR exceeded 768 Mi during the initial group join sync burst → killed.
#   Fix: raise limit to 700 Mi, reduce innodb_buffer_pool to 96 M (from 192 M).
#
# Deploy:
#   kubectl create ns mysql-cluster
#   helm upgrade --install mysql-service . -n mysql-cluster -f values-production.yaml
# ─────────────────────────────────────────────────────────────────────────────

image:
  repository: mysql
  tag: "8.0.36"
  pullPolicy: IfNotPresent

namespace: "mysql-cluster"

rootPassword: "root"

users:
  - name: "appuser"
    password: "App@1234"
  - name: "dbadmin"
    password: "Dba@5678"

multus:
  enabled: false
  networkAttachmentDefinition: macvlan-mysql-primary

groupReplication:
  groupName: "aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee"
  groupPort: 33061

storage:
  size: "2Gi"
  storageClass: "local-path"

# Burstable QoS — requests low (scheduler places pods), limits high enough to
# absorb GR join spike without OOMKill.
resources:
  primary:
    requests:
      cpu: "50m"
      memory: "400Mi"
    limits:
      cpu: "400m"       # burst during GR bootstrap (single 1-CPU node)
      memory: "600Mi"   # mysqld + GR + join spike fits in 700Mi
  secondary:
    requests:
      cpu: "50m"
      memory: "400Mi"
    limits:
      cpu: "400m"
      memory: "600Mi"   # same — GR join sync can spike all members simultaneously

mysqlPort: 3306

mysqlConfig:
  maxConnections: 30
  innodbBufferPoolSize: "96M"   # reduced from 192M — key fix for OOM

consul:
  enabled: false
  url: "https://consul-server.consul.svc.cluster.local:8501"
  token: "693c91b6-88d9-87b2-3331-e6025c8f2cb8"
  serviceName: "mysql-service"
  serviceAccountName: "mysql-service"
  zone: "ZONE-1"
  excludeInboundPorts:  "3306,33061"
  excludeOutboundPorts: "3306,33061"

# Probes — generous delays for slow single-vCPU node.
# liveness: 360s initial so GR has 6 min to reach ONLINE before any kill.
# readiness: 120s initial — pod only receives traffic after mysqld is ready.
probes:
  liveness:
    enabled: true
    initialDelaySeconds: 360   # 6 min: covers slow init + GR join on 1 CPU
    periodSeconds: 20
    timeoutSeconds: 10
    failureThreshold: 6        # 2 min additional grace after liveness starts
  readiness:
    enabled: true
    initialDelaySeconds: 120
    periodSeconds: 15
    timeoutSeconds: 10
    failureThreshold: 5
