# PostgreSQL HA — values.yaml (base defaults)
# Deploy: helm upgrade --install postgres-service . -f values.yaml -f values-production.yaml
#         helm upgrade --install postgres-service . -f values.yaml -f values-staging.yaml

image:
  repository: timescale/timescaledb
  tag: "latest-pg17"
  pullPolicy: IfNotPresent

# TimescaleDB extension — loaded via shared_preload_libraries
timescaledb:
  enabled: true

namespace: "postgres-cluster"

postgresPassword: "postgres"

users:
  - name: "admin"
    password: "Admin@123"
  - name: "dbadmin"
    password: "Dba@5678"

defaultDatabase: "postgres"

# High Availability — set ha.enabled=true to deploy standby pods
ha:
  enabled: false
  replicas: 2

# Multus / MacVLAN — PRIMARY ONLY gets a MacVLAN IP for external routing
multus:
  enabled: true
  networkAttachmentDefinition: macvlan-postgres-179

# Network / pg_hba.conf
network:
  authMethod: "md5"          # md5 | scram-sha-256 | trust
  allowedCIDRs:
    - cidr: "0.0.0.0/0"
      databases: ["all"]
      replication: true

# Storage
storage:
  size: "10Gi"
  storageClass: "local-path"
  accessMode: "ReadWriteOnce"

# Resources — Guaranteed QoS (request = limit) for production
resources:
  primary:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  standby:
    requests:
      cpu: "300m"
      memory: "512Mi"
    limits:
      cpu: "300m"
      memory: "512Mi"

postgresPort: 5432

postgresConfig:
  maxConnections: 200
  sharedBuffers: "256MB"
  effectiveCacheSize: "512MB"
  walLevel: "replica"          # must be "replica" or "logical" for streaming replication
  maxWalSenders: 10
  maxReplicationSlots: 10
  hotStandby: "on"
  walKeepSize: "128MB"

# Consul — connect-inject Envoy sidecar
consul:
  enabled: true
  url: "https://consul-server.consul.svc.cluster.local:8501"
  token: "693c91b6-88d9-87b2-3331-e6025c8f2cb8"
  serviceName: "postgres-service"
  serviceAccountName: "postgres-service"
  zone: "ZONE-1"
  excludeInboundPorts: "5432"
  excludeOutboundPorts: "5432"

# Probes — disabled by default; enable in environment overlays after validation
probes:
  liveness:
    enabled: false
    initialDelaySeconds: 60
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 5
  readiness:
    enabled: false
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
