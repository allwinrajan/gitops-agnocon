# postgres-service — values-production.yaml
# ─────────────────────────────────────────────────────────────────────────────
# TARGET CLUSTER: 2 nodes × 1 CPU × 2.4 GB RAM each
#
# MEMORY BUDGET — PostgreSQL streaming replication (3 pods):
#   postgres base RSS with shared_buffers=32MB:      ~80–100 MB
#   Per-connection overhead (max_connections=20):    ~20 MB
#   TimescaleDB extension overhead:                  ~30 MB
#   Safe per-pod limit:                              384 Mi
#   3 pods × 384 Mi = 1.15 GB — comfortably fits on 2 nodes
#
# Replication: streaming WAL — standby runs pg_basebackup on first start,
#   then applies WAL segments continuously (hot_standby=on for reads).
# Failover: manual pg_ctl promote on standby-0-0 (or use Patroni for auto).
#   Standbys remain readable during primary outage (hot_standby).
#
# Deploy:
#   kubectl create ns postgres-cluster
#   helm upgrade --install postgres-service . -n postgres-cluster -f values-production.yaml
# ─────────────────────────────────────────────────────────────────────────────

image:
  repository: timescale/timescaledb
  tag: "latest-pg17"
  pullPolicy: IfNotPresent

timescaledb:
  enabled: true

namespace: "postgres-cluster"

postgresPassword: "postgres"

users:
  - name: "admin"
    password: "Admin@123"
  - name: "dbadmin"
    password: "Dba@5678"

defaultDatabase: "postgres"

ha:
  enabled: true
  replicas: 2

multus:
  enabled: false
  networkAttachmentDefinition: macvlan-postgres-179

network:
  authMethod: "md5"
  allowedCIDRs:
    - cidr: "0.0.0.0/0"
      databases: ["all"]
      replication: true

storage:
  size: "2Gi"
  storageClass: "local-path"
  accessMode: "ReadWriteOnce"

# Burstable QoS — low requests, limits sized to avoid OOM.
# timescaledb image is heavier than vanilla postgres (~150MB RSS).
# 384Mi limit gives 234Mi headroom over base RSS — enough for queries + WAL.
resources:
  primary:
    requests:
      cpu: "100m"
      memory: "200Mi"
    limits:
      cpu: "700m"
      memory: "384Mi"
  standby:
    requests:
      cpu: "100m"
      memory: "200Mi"
    limits:
      cpu: "500m"
      memory: "384Mi"   # standby also runs timescaledb + WAL receiver

postgresPort: 5432

postgresConfig:
  maxConnections: 20
  sharedBuffers: "32MB"         # must be < ~1/4 of limit (384Mi → max 96MB; using 32MB)
  effectiveCacheSize: "128MB"
  walLevel: "replica"           # streaming replication requires replica or logical
  maxWalSenders: 3              # 1 per standby + 1 spare
  maxReplicationSlots: 3
  hotStandby: "on"              # standbys serve read-only queries
  walKeepSize: "16MB"           # small — standby connects quickly on 2Gi PVC

consul:
  enabled: false
  url: "https://consul-server.consul.svc.cluster.local:8501"
  token: "693c91b6-88d9-87b2-3331-e6025c8f2cb8"
  serviceName: "postgres-service"
  serviceAccountName: "postgres-service"
  zone: "ZONE-1"
  excludeInboundPorts: "5432"
  excludeOutboundPorts: "5432"

# Probes — standby runs pg_basebackup on first start (can take 30-60s for 2Gi DB).
# initialDelaySeconds must be > pg_basebackup time + postgres startup time.
probes:
  liveness:
    enabled: true
    initialDelaySeconds: 120   # covers pg_basebackup + startup on slow node
    periodSeconds: 15
    timeoutSeconds: 8
    failureThreshold: 5
  readiness:
    enabled: true
    initialDelaySeconds: 90
    periodSeconds: 10
    timeoutSeconds: 8
    failureThreshold: 5
