{{- if .Values.ha.enabled }}
---
# ==============================================================================
# StatefulSet: postgres-cluster-standby-0  (pod: postgres-cluster-standby-0-0)
#
# Role    : PostgreSQL hot standby — streaming replication from primary.
#           Read-only queries allowed (hot_standby = on).
# Multus  : NONE — standbys use eth0 only for replication and read traffic.
#           No MacVLAN NIC. fix-routing still runs but exits immediately
#           when net1 is absent (no MacVLAN route manipulation needed).
# Consul  : connect-inject Envoy sidecar. NO consul-tag-patcher (no MacVLAN).
#           Consul registers pod eth0 IP. Standbys are NOT the LAN entry point.
# Init    : pg_basebackup from primary on fresh PVC, then starts in standby mode.
# Storage : local-path, 10Gi, ReadWriteOnce (own PVC, independent of primary).
# Created : Only when ha.enabled=true. Set ha.enabled=false for primary-only.
# ==============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "postgres.name" . }}-standby-0
  namespace: {{ include "postgres.namespace" . }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
    app.kubernetes.io/component: standby
spec:
  serviceName: {{ include "postgres.headlessSvc" . }}
  replicas: 1
  selector:
    matchLabels:
      app: postgres
      role: standby
      postgres/pod: standby-0
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: postgres
        role: standby
        postgres/pod: standby-0
      annotations:
        # NO Multus annotation — standbys have no MacVLAN NIC
        {{- if .Values.consul.enabled }}
        consul.hashicorp.com/connect-inject:                           "true"
        consul.hashicorp.com/connect-service:                          {{ .Values.consul.serviceName | quote }}
        consul.hashicorp.com/transparent-proxy:                        "false"
        consul.hashicorp.com/transparent-proxy-exclude-inbound-ports:  {{ .Values.consul.excludeInboundPorts | quote }}
        consul.hashicorp.com/transparent-proxy-exclude-outbound-ports: {{ .Values.consul.excludeOutboundPorts | quote }}
        consul.hashicorp.com/service-meta-zone: {{ .Values.consul.zone | quote }}
        consul.hashicorp.com/service-meta-role: "standby"
        postgres.agnoshin.io/role: "standby"
        {{- end }}
    spec:
      terminationGracePeriodSeconds: 30
      {{- if .Values.consul.enabled }}
      serviceAccountName: {{ .Values.consul.serviceAccountName }}
      {{- end }}

      initContainers:
        # fix-routing: runs on all pods. On standbys net1 is absent —
        # the init container waits 30s then proceeds without error.
        # Still applies eth0 cluster CIDR routes and table 100 (Envoy probe fix).
        {{- include "postgres.fixRouting" . | nindent 8 }}
        # NO consul-tag-patcher — standbys have no MacVLAN IP to register.

      containers:
        - name: postgres
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["bash", "/scripts/entrypoint.sh"]
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_ROLE
              value: "standby"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "postgres.name" . }}-secret
                  key: postgres-password
            - name: POSTGRES_REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "postgres.name" . }}-secret
                  key: replication-password
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          ports:
            - name: postgres
              containerPort: {{ .Values.postgresPort }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            exec:
              command: ["bash", "/scripts/liveness.sh"]
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds:       {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds:      {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold:    {{ .Values.probes.liveness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            exec:
              command: ["bash", "/scripts/readiness.sh"]
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds:       {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds:      {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold:    {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources.standby | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: config
              mountPath: /mnt/postgres-config
              readOnly: true
            - name: scripts
              mountPath: /scripts
              readOnly: true

      volumes:
        - name: config
          configMap:
            name: {{ include "postgres.name" . }}-config
            defaultMode: 0444
        - name: scripts
          configMap:
            name: {{ include "postgres.name" . }}-scripts
            defaultMode: 0755

  # PVC — local-path 10Gi ReadWriteOnce (own PVC, not shared with primary)
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [{{ .Values.storage.accessMode | quote }}]
        storageClassName: {{ .Values.storage.storageClass | quote }}
        resources:
          requests:
            storage: {{ .Values.storage.size }}

---
# ==============================================================================
# StatefulSet: postgres-cluster-standby-1  (pod: postgres-cluster-standby-1-0)
# Same as standby-0 — second hot standby for redundancy.
# ==============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "postgres.name" . }}-standby-1
  namespace: {{ include "postgres.namespace" . }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
    app.kubernetes.io/component: standby
spec:
  serviceName: {{ include "postgres.headlessSvc" . }}
  replicas: 1
  selector:
    matchLabels:
      app: postgres
      role: standby
      postgres/pod: standby-1
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: postgres
        role: standby
        postgres/pod: standby-1
      annotations:
        {{- if .Values.consul.enabled }}
        consul.hashicorp.com/connect-inject:                           "true"
        consul.hashicorp.com/connect-service:                          {{ .Values.consul.serviceName | quote }}
        consul.hashicorp.com/transparent-proxy:                        "false"
        consul.hashicorp.com/transparent-proxy-exclude-inbound-ports:  {{ .Values.consul.excludeInboundPorts | quote }}
        consul.hashicorp.com/transparent-proxy-exclude-outbound-ports: {{ .Values.consul.excludeOutboundPorts | quote }}
        consul.hashicorp.com/service-meta-zone: {{ .Values.consul.zone | quote }}
        consul.hashicorp.com/service-meta-role: "standby"
        postgres.agnoshin.io/role: "standby"
        {{- end }}
    spec:
      terminationGracePeriodSeconds: 30
      {{- if .Values.consul.enabled }}
      serviceAccountName: {{ .Values.consul.serviceAccountName }}
      {{- end }}

      initContainers:
        {{- include "postgres.fixRouting" . | nindent 8 }}

      containers:
        - name: postgres
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["bash", "/scripts/entrypoint.sh"]
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_ROLE
              value: "standby"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "postgres.name" . }}-secret
                  key: postgres-password
            - name: POSTGRES_REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "postgres.name" . }}-secret
                  key: replication-password
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          ports:
            - name: postgres
              containerPort: {{ .Values.postgresPort }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            exec:
              command: ["bash", "/scripts/liveness.sh"]
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds:       {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds:      {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold:    {{ .Values.probes.liveness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            exec:
              command: ["bash", "/scripts/readiness.sh"]
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds:       {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds:      {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold:    {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources.standby | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: config
              mountPath: /mnt/postgres-config
              readOnly: true
            - name: scripts
              mountPath: /scripts
              readOnly: true

      volumes:
        - name: config
          configMap:
            name: {{ include "postgres.name" . }}-config
            defaultMode: 0444
        - name: scripts
          configMap:
            name: {{ include "postgres.name" . }}-scripts
            defaultMode: 0755

  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [{{ .Values.storage.accessMode | quote }}]
        storageClassName: {{ .Values.storage.storageClass | quote }}
        resources:
          requests:
            storage: {{ .Values.storage.size }}
{{- end }}
