---
# ==============================================================================
# Headless Service — stable per-pod DNS for streaming replication and discovery
#
# Pod DNS examples (ha.enabled: true):
#   postgres-cluster-primary-0.postgres-headless.postgres-cluster.svc.cluster.local
#   postgres-cluster-standby-0-0.postgres-headless.postgres-cluster.svc.cluster.local
#   postgres-cluster-standby-1-0.postgres-headless.postgres-cluster.svc.cluster.local
#
# Pod DNS example (ha.enabled: false):
#   postgres-cluster-primary-0.postgres-headless.postgres-cluster.svc.cluster.local
# ==============================================================================
apiVersion: v1
kind: Service
metadata:
  name: {{ include "postgres.headlessSvc" . }}
  namespace: {{ include "postgres.namespace" . }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: postgres
  ports:
    - name: postgres
      port: {{ .Values.postgresPort }}
      targetPort: postgres

---
# ==============================================================================
# Primary ClusterIP — read/write endpoint (postgres-service for Consul)
# This is also the Consul-registered service: postgres-service.
# ==============================================================================
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: {{ include "postgres.namespace" . }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
    app.kubernetes.io/component: primary
spec:
  type: ClusterIP
  selector:
    app: postgres
    role: primary
  ports:
    - name: postgres
      port: {{ .Values.postgresPort }}
      targetPort: postgres

{{- if .Values.ha.enabled }}
---
# ==============================================================================
# Standby ClusterIP — read-only endpoint (only created when ha.enabled: true)
# ==============================================================================
apiVersion: v1
kind: Service
metadata:
  name: {{ include "postgres.name" . }}-standby
  namespace: {{ include "postgres.namespace" . }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
    app.kubernetes.io/component: standby
spec:
  type: ClusterIP
  selector:
    app: postgres
    role: standby
  ports:
    - name: postgres
      port: {{ .Values.postgresPort }}
      targetPort: postgres
{{- end }}
