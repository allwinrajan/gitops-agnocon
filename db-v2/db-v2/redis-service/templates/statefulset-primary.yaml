---
# ==============================================================================
# StatefulSet: redis-primary  (pod: redis-primary-0)
#
# Role: Redis master — all writes land here.
# Multus: net1 from macvlan-redis-primary NAD for direct LAN access.
# Consul: connect-inject Envoy sidecar. consul-tag-patcher patches annotations
#         with real Multus IP so routing engine sees LAN IP in service-meta.
# Resources: 2 CPU limit (primary handles writes + replication overhead).
# postStart: CONFIG SET notify-keyspace-events at runtime — active immediately,
#            survives CONFIG REWRITE. Belt-and-braces with redis.conf setting.
# PVC: reuses existing data-redis-primary-0 (15Gi on longhorn-redis).
# terminationGracePeriodSeconds: 30 — gives Sentinel time to detect the
#   primary going away and start the election before the pod is force-killed.
# ==============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-primary
  namespace: {{ include "redis.namespace" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
    app.kubernetes.io/component: primary
spec:
  serviceName: {{ include "redis.headlessSvc" . }}
  replicas: 1
  selector:
    matchLabels:
      app: redis
      role: primary
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: redis
        role: primary
      annotations:
        # ── Multus ─────────────────────────────────────────────────────────────
        {{- if .Values.multus.primary.enabled }}
        k8s.v1.cni.cncf.io/networks: {{ .Values.multus.primary.nadName | quote }}
        {{- end }}
        # ── Consul Connect ─────────────────────────────────────────────────────
        {{- if .Values.consul.enabled }}
        consul.hashicorp.com/connect-inject:        "true"
        consul.hashicorp.com/transparent-proxy:     "false"
        consul.hashicorp.com/connect-service:       {{ .Values.consul.serviceName | quote }}
        # Exclude Redis + Sentinel ports from Envoy interception.
        # Redis replication and Sentinel gossip must use direct pod networking —
        # routing them through Envoy causes authentication failures and latency.
        consul.hashicorp.com/transparent-proxy-exclude-inbound-ports:  {{ .Values.consul.excludeInboundPorts | quote }}
        consul.hashicorp.com/transparent-proxy-exclude-outbound-ports: {{ .Values.consul.excludeOutboundPorts | quote }}
        # Placeholder annotations — consul-tag-patcher will overwrite these
        # with the real Multus IP before Envoy reads them for registration.
        consul.hashicorp.com/service-meta-multus_ip:  "pending"
        consul.hashicorp.com/service-meta-multus_net: {{ .Values.multus.primary.nadName | quote }}
        consul.hashicorp.com/service-meta-role:       "primary"
        {{- end }}
    spec:
      terminationGracePeriodSeconds: 30
      {{- if .Values.consul.enabled }}
      serviceAccountName: {{ .Values.consul.serviceAccountName }}
      {{- end }}

      # ── Init containers ────────────────────────────────────────────────────
      initContainers:
        # 1. Fix MacVLAN routing — must run before consul-tag-patcher
        #    so eth0 cluster routes exist when the patcher calls K8s API.
        {{- include "redis.fixRouting" . | nindent 8 }}

        # 2. Consul tag patcher — patches pod annotations with real Multus IP
        #    so Envoy sidecar registers the LAN IP in Consul service catalog.
        {{- if and .Values.consul.enabled .Values.multus.primary.enabled }}
        {{- include "redis.consulTagPatcher" (dict
              "nadName" .Values.multus.primary.nadName
              "port"    "6379"
              "role"    "primary"
              "ctx"     .) | nindent 8 }}
        {{- end }}

      # ── Main container ─────────────────────────────────────────────────────
      containers:
        - name: redis
          image: {{ .Values.image.redis }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # redis-server loads modules from redis.conf loadmodule directives.
          # Modules (ReJSON, RediSearch) defined in /etc/redis/redis.conf.
          command:
            - sh
            - -c
            - exec /entrypoint.sh --include /etc/redis/redis.conf
          env:
            - name: REDIS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: redis-auth
                  key: redis-username
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-auth
                  key: redis-password
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP

          # ── Lifecycle ───────────────────────────────────────────────────────
          # IMPORTANT: postStart runs concurrently with the container entrypoint.
          # Redis-server may not be ready when postStart fires. The script MUST
          # always exit 0 — any non-zero exit kills the container immediately
          # (PostStartHookError → CrashLoopBackOff).
          # notify-keyspace-events is already set in redis.conf so the CONFIG SET
          # here is belt-and-braces only — safe to skip if Redis isn't up yet.
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    # Wait up to 60s for Redis to accept connections, then apply
                    # CONFIG SET notify-keyspace-events. Always exit 0.
                    for i in $(seq 1 30); do
                      if redis-cli -a "${REDIS_PASSWORD}" \
                           --no-auth-warning PING 2>/dev/null | grep -q PONG; then
                        redis-cli -a "${REDIS_PASSWORD}" --no-auth-warning CONFIG SET notify-keyspace-events 'Exg$Klt' 2>/dev/null || true
                        redis-cli --no-auth-warning ACL SETUSER {{ .Values.auth.username }} on ">{{ .Values.auth.password }}" resetpass ">{{ .Values.auth.password }}" "~*" "&*" +@all 2>/dev/null || true
                        echo "[postStart] CONFIG SET and ACL SETUSER admin OK"
                        exit 0
                      fi
                      sleep 2
                    done
                    echo "[postStart] Redis not ready in 60s — skipped"
                    exit 0
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    # Sleep gives Sentinel downAfterMs=5000 time to detect the
                    # primary going away and start election before SIGKILL.
                    echo "[preStop] waiting 8s for Sentinel election to start"
                    sleep 8
                    redis-cli -a "${REDIS_PASSWORD}" --no-auth-warning SHUTDOWN NOSAVE 2>/dev/null || true
                    exit 0

          # ── Probes ──────────────────────────────────────────────────────────
          {{- if .Values.probes.enabled }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "${REDIS_PASSWORD}" --no-auth-warning PING | grep -q PONG
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds:       {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds:      {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold:    {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  redis-cli -a "${REDIS_PASSWORD}" \
                    --no-auth-warning INFO replication | grep -q "role:master"
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds:       {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds:      {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold:    {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}

          resources:
            {{- toYaml .Values.resources.primary | nindent 12 }}

          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/redis

      volumes:
        - name: config
          configMap:
            name: redis-config

  # ── PVC — matches existing data-redis-primary-0 (15Gi) ───────────────────
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.storage.storageClass | quote }}
        resources:
          requests:
            storage: {{ .Values.storage.primary.size }}
