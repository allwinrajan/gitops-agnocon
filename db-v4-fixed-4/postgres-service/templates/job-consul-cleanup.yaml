{{- if .Values.consul.enabled }}
---
# ==============================================================================
# pre-install / pre-upgrade Job — purges stale Consul service registrations
# from a previous helm release before new pods come up.
# With connect-inject: true, Consul Connect owns registration lifecycle, but
# stale entries from crashed pods or force-deleted namespaces need manual cleanup.
# ==============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-consul-cleanup
  namespace: {{ include "postgres.namespace" . }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: consul-cleanup
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: CONSUL_URL
              value: {{ .Values.consul.url | quote }}
            - name: CONSUL_TOKEN
              value: {{ .Values.consul.token | quote }}
            - name: CONSUL_SERVICE_NAME
              value: {{ .Values.consul.serviceName | quote }}
            - name: HA_ENABLED
              value: {{ .Values.ha.enabled | quote }}
          command:
            - python3
            - -u
            - -c
            - |
              import json, os, ssl, sys, urllib.request, urllib.error

              def log(msg): print("[consul-cleanup] " + str(msg), flush=True)

              consul_url   = os.environ["CONSUL_URL"]
              consul_token = os.environ["CONSUL_TOKEN"]
              svc_name     = os.environ["CONSUL_SERVICE_NAME"]
              ha_enabled   = os.environ.get("HA_ENABLED", "false").lower() == "true"

              ssl_ctx = ssl.create_default_context()
              ssl_ctx.check_hostname = False
              ssl_ctx.verify_mode    = ssl.CERT_NONE

              def consul_req(method, path, data=None):
                  url = consul_url.rstrip("/") + path
                  req = urllib.request.Request(url, data=data, method=method,
                      headers={"X-Consul-Token": consul_token,
                               **( {"Content-Type": "application/json"} if data else {})})
                  try:
                      with urllib.request.urlopen(req, context=ssl_ctx, timeout=10) as r:
                          return r.status, r.read()
                  except urllib.error.HTTPError as e:
                      return e.code, b""

              status, body = consul_req("GET", "/v1/catalog/service/" + svc_name)
              if status != 200:
                  log("Could not list instances (first install?): HTTP " + str(status))
                  sys.exit(0)

              instances = json.loads(body)
              if not instances:
                  log("No existing instances — nothing to clean up")
                  sys.exit(0)

              log("Found " + str(len(instances)) + " existing instance(s) for " + svc_name)

              # Build expected service IDs based on topology
              expected_ids = {
                  svc_name + "-postgres-cluster-primary-0",
                  svc_name + "-postgres-cluster-primary-0-sidecar-proxy",
              }
              if ha_enabled:
                  expected_ids.update({
                      svc_name + "-postgres-cluster-standby-0-0",
                      svc_name + "-postgres-cluster-standby-1-0",
                      svc_name + "-postgres-cluster-standby-0-0-sidecar-proxy",
                      svc_name + "-postgres-cluster-standby-1-0-sidecar-proxy",
                  })

              for inst in instances:
                  sid  = inst.get("ServiceID", "")
                  node = inst.get("Node", "")
                  if sid not in expected_ids:
                      log("Deregistering stale: " + sid + " on node " + node)
                      payload = json.dumps({"Datacenter": "dc1", "Node": node,
                                            "ServiceID": sid}).encode()
                      st, _ = consul_req("PUT", "/v1/catalog/deregister", payload)
                      log("  -> HTTP " + str(st))
                  else:
                      log("Keeping valid: " + sid)

              log("Cleanup complete")
{{- end }}
