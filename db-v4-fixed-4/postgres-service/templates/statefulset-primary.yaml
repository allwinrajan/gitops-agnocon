---
# ==============================================================================
# StatefulSet: postgres-cluster-primary  (pod: postgres-cluster-primary-0)
#
# Role    : PostgreSQL primary — accepts all read/write connections.
# Multus  : net1 from .Values.multus.networkAttachmentDefinition when multus.enabled=true.
#           LAN IP for external access via MacVLAN.
#           fix-routing init container removes MacVLAN default route hijack.
# Consul  : connect-inject Envoy sidecar registered as "postgres-service".
#           consul-tag-patcher patches service-meta with MacVLAN IP so the
#           routing engine sees the LAN IP (192.168.x.x), not pod IP.
#           Only runs when multus.enabled=true.
# HA      : When ha.enabled=false, this is the only pod deployed (standalone).
#           When ha.enabled=true, standbys replicate from this pod.
# Storage : local-path, 10Gi, ReadWriteOnce.
# ==============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "postgres.name" . }}-primary
  namespace: {{ include "postgres.namespace" . }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
    app.kubernetes.io/component: primary
spec:
  serviceName: {{ include "postgres.headlessSvc" . }}
  replicas: 1
  selector:
    matchLabels:
      app: postgres
      role: primary
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: postgres
        role: primary
      annotations:
        # ── Multus MacVLAN — PRIMARY ONLY (when multus.enabled) ──────────────
        {{- if .Values.multus.enabled }}
        k8s.v1.cni.cncf.io/networks: {{ .Values.multus.networkAttachmentDefinition | quote }}
        {{- end }}
        # ── Consul Connect ───────────────────────────────────────────────────
        {{- if .Values.consul.enabled }}
        consul.hashicorp.com/connect-inject:                           "true"
        consul.hashicorp.com/connect-service:                          {{ .Values.consul.serviceName | quote }}
        consul.hashicorp.com/transparent-proxy:                        "false"
        consul.hashicorp.com/transparent-proxy-exclude-inbound-ports:  {{ .Values.consul.excludeInboundPorts | quote }}
        consul.hashicorp.com/transparent-proxy-exclude-outbound-ports: {{ .Values.consul.excludeOutboundPorts | quote }}
        {{- if .Values.multus.enabled }}
        # Placeholder — consul-tag-patcher overwrites with live MacVLAN IP
        consul.hashicorp.com/service-meta-multus_ip:   "pending"
        consul.hashicorp.com/service-meta-multus_name: {{ .Values.multus.networkAttachmentDefinition | quote }}
        {{- end }}
        consul.hashicorp.com/service-meta-zone:        {{ .Values.consul.zone | quote }}
        consul.hashicorp.com/service-meta-role:        "primary"
        postgres.agnoshin.io/multus-ip:   {{ if .Values.multus.enabled }}"pending"{{ else }}"disabled"{{ end }}
        postgres.agnoshin.io/role:        "primary"
        postgres.agnoshin.io/registered:  "false"
        {{- end }}
    spec:
      terminationGracePeriodSeconds: 30
      {{- if .Values.consul.enabled }}
      serviceAccountName: {{ .Values.consul.serviceAccountName }}
      {{- end }}

      initContainers:
        # Step 1: fix-routing — must run before consul-connect-inject-init
        # so Envoy can reach consul-server over eth0 after MacVLAN hijacks default route.
        # When multus.enabled=false net1 is absent — exits gracefully.
        # FIX: pass root context "." explicitly so .Release is never nil inside the helper.
        {{- include "postgres.fixRouting" . | nindent 8 }}

        # Step 2: consul-tag-patcher — patches pod annotations with MacVLAN IP.
        # Only runs when BOTH consul.enabled AND multus.enabled are true.
        # FIX: "ctx" key carries the Helm root "."; helpers inside use $ctx, not ".".
        {{- if and .Values.consul.enabled .Values.multus.enabled }}
        {{- include "postgres.consulTagPatcher" (dict
              "nadName" .Values.multus.networkAttachmentDefinition
              "port"    "5432"
              "role"    "primary"
              "ctx"     .) | nindent 8 }}
        {{- end }}

      containers:
        - name: postgres
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["bash", "/scripts/entrypoint.sh"]
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_ROLE
              value: "primary"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "postgres.name" . }}-secret
                  key: postgres-password
            - name: POSTGRES_REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "postgres.name" . }}-secret
                  key: replication-password
            {{- range .Values.users }}
            - name: USER_{{ .name | upper }}_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "postgres.name" $ }}-secret
                  key: user-{{ .name }}
            {{- end }}
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          ports:
            - name: postgres
              containerPort: {{ .Values.postgresPort }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            exec:
              command: ["bash", "/scripts/liveness.sh"]
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds:       {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds:      {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold:    {{ .Values.probes.liveness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            exec:
              command: ["bash", "/scripts/readiness.sh"]
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds:       {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds:      {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold:    {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources.primary | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: config
              mountPath: /mnt/postgres-config
              readOnly: true
            - name: scripts
              mountPath: /scripts
              readOnly: true

      volumes:
        - name: config
          configMap:
            name: {{ include "postgres.name" . }}-config
            defaultMode: 0444
        - name: scripts
          configMap:
            name: {{ include "postgres.name" . }}-scripts
            defaultMode: 0755

  # PVC — local-path 10Gi ReadWriteOnce
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [{{ .Values.storage.accessMode | quote }}]
        storageClassName: {{ .Values.storage.storageClass | quote }}
        resources:
          requests:
            storage: {{ .Values.storage.size }}
