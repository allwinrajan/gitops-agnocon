apiVersion: v2
name: postgres-service
description: >
  PostgreSQL / TimescaleDB HA Helm Chart — telecom K8s.
  Primary-only mode (HA disabled) or Primary + Streaming Replication Standby (HA enabled).
  Optional TimescaleDB extension (timescaledb.enabled) — loaded via shared_preload_libraries,
  initialized on Primary with CREATE EXTENSION IF NOT EXISTS timescaledb CASCADE;
  standbys receive extension automatically via streaming replication.
  Optional Multus MacVLAN net1 on Primary for external LAN access.
  Consul Connect-inject (Envoy sidecar) — identical pattern to MySQL/Redis/Kamailio.
  consul-tag-patcher writes MacVLAN IP into service-meta for routing engine.
  Storage: local-path 10Gi RWO per pod.
type: application
version: 1.1.0
appVersion: "17"
keywords:
  - postgres
  - postgresql
  - timescaledb
  - ha
  - streaming-replication
  - multus
  - consul
  - telecom
