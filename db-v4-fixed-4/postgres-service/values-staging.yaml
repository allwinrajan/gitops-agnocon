# postgres-service — values-staging.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Production-grade spec — Guaranteed QoS, Multus MacVLAN, Consul Connect.
# For large nodes: ≥4 CPU, ≥8 GB RAM per node.
#
# Deploy:
#   helm upgrade --install postgres-service . -n postgres-cluster -f values-staging.yaml
# ─────────────────────────────────────────────────────────────────────────────

image:
  repository: timescale/timescaledb
  tag: "latest-pg17"
  pullPolicy: IfNotPresent

timescaledb:
  enabled: true

namespace: "postgres-cluster"

postgresPassword: "postgres"

users:
  - name: "admin"
    password: "Admin@123"
  - name: "dbadmin"
    password: "Dba@5678"

defaultDatabase: "postgres"

ha:
  enabled: true
  replicas: 2

# Multus: enabled — primary gets MacVLAN LAN IP
multus:
  enabled: true
  networkAttachmentDefinition: macvlan-postgres-179

network:
  authMethod: "md5"
  allowedCIDRs:
    - cidr: "0.0.0.0/0"
      databases: ["all"]
      replication: true

storage:
  size: "10Gi"
  storageClass: "longhorn-postgres"
  accessMode: "ReadWriteOnce"

# Guaranteed QoS — request = limit
resources:
  primary:
    requests:
      cpu: "1000m"
      memory: "2Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
  standby:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "500m"
      memory: "1Gi"

postgresPort: 5432

postgresConfig:
  maxConnections: 200
  sharedBuffers: "512MB"
  effectiveCacheSize: "1GB"
  walLevel: "replica"
  maxWalSenders: 10
  maxReplicationSlots: 10
  hotStandby: "on"
  walKeepSize: "128MB"

# Consul: enabled
consul:
  enabled: true
  url: "https://consul-server.consul.svc.cluster.local:8501"
  token: "693c91b6-88d9-87b2-3331-e6025c8f2cb8"
  serviceName: "postgres-service"
  serviceAccountName: "postgres-service"
  zone: "ZONE-1"
  excludeInboundPorts: "5432"
  excludeOutboundPorts: "5432"

probes:
  liveness:
    enabled: true
    initialDelaySeconds: 60
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 5
  readiness:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
