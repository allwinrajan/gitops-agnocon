{{- if .Values.consul.enabled }}
# ==============================================================================
# RBAC for consul-tag-patcher init container
# ServiceAccount name MUST equal consul.serviceName — Consul Connect enforces
# that the SA name matches the connect-service annotation exactly.
# The Role grants get+patch on pods so the init container can update annotations
# with the real Multus IP before Envoy sidecar reads them for registration.
# ==============================================================================
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.consul.serviceAccountName }}
  namespace: {{ include "redis.namespace" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.consul.serviceAccountName }}-pod-patcher
  namespace: {{ include "redis.namespace" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.consul.serviceAccountName }}-pod-patcher
  namespace: {{ include "redis.namespace" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Values.consul.serviceAccountName }}-pod-patcher
subjects:
  - kind: ServiceAccount
    name: {{ .Values.consul.serviceAccountName }}
    namespace: {{ include "redis.namespace" . }}
{{- end }}
