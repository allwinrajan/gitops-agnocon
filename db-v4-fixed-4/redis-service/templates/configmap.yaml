---
# ==============================================================================
# ConfigMap: redis-config
# FIX v2: requirepass is set in redis.conf so the default user always has
# a password from the very first start — before any postStart hook fires.
# redis-stack-server /entrypoint.sh loads modules first, THEN processes
# --include config, so the password is active as soon as Redis accepts
# connections. Replicas and probes that authenticate with -a PASS will work.
# ==============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: {{ include "redis.namespace" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
data:
  redis.conf: |
    # ── Network ────────────────────────────────────────────────────────────────
    bind 0.0.0.0
    port 6379
    protected-mode no
    tcp-keepalive {{ .Values.redis.tcpKeepalive }}
    hz {{ .Values.redis.hz }}

    # ── Auth — requirepass only (no aclfile — avoids stale PVC ACL state) ────
    # redis-stack-server on FIRST boot (no RDB/AOF on PVC) initialises with
    # the default user having NO password, then loads the --include config.
    # Setting requirepass here ensures the password is applied atomically
    # during config load, before any client (probe, replica) tries to connect.
    requirepass {{ .Values.auth.password }}
    masterauth  {{ .Values.auth.password }}

    # ── Persistence ────────────────────────────────────────────────────────────
    appendonly {{ .Values.redis.appendonly }}
    appendfsync {{ .Values.redis.appendfsync }}
    dir /data
    dbfilename dump.rdb

    # ── Pub/Sub ────────────────────────────────────────────────────────────────
    notify-keyspace-events "Exg$Klt"
    client-output-buffer-limit pubsub 67108864 33554432 60

    # ── Memory ────────────────────────────────────────────────────────────────
    maxmemory {{ .Values.redis.maxmemory }}
    maxmemory-policy {{ .Values.redis.maxmemoryPolicy }}

    # ── Replication ───────────────────────────────────────────────────────────
    replica-read-only yes
    replica-lazy-flush yes
    lazyfree-lazy-eviction yes
    replica-serve-stale-data yes

    {{- if .Values.redis.extraConfig }}
    # ── Extra config ──────────────────────────────────────────────────────────
    {{ .Values.redis.extraConfig | nindent 4 }}
    {{- end }}


---
# ==============================================================================
# ConfigMap: sentinel-config
# ==============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: sentinel-config
  namespace: {{ include "redis.namespace" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
data:
  sentinel.conf: |
    port {{ .Values.sentinel.port }}
    protected-mode no

    sentinel monitor {{ .Values.sentinel.masterName }} {{ include "redis.primaryFQDN" . }} 6379 {{ .Values.sentinel.quorum }}

    # Auth — must match requirepass in redis.conf
    sentinel auth-pass {{ .Values.sentinel.masterName }} {{ .Values.auth.password }}

    sentinel down-after-milliseconds {{ .Values.sentinel.masterName }} {{ .Values.sentinel.downAfterMs }}
    sentinel failover-timeout        {{ .Values.sentinel.masterName }} {{ .Values.sentinel.failoverTimeout }}
    sentinel parallel-syncs          {{ .Values.sentinel.masterName }} {{ .Values.sentinel.parallelSyncs }}

    # FQDN-based failover — critical for Kubernetes pod-IP churn
    sentinel resolve-hostnames yes
    sentinel announce-hostnames yes
