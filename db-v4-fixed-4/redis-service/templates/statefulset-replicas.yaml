---
# ==============================================================================
# StatefulSet: redis-replica-1  (pod: redis-replica-1-0)
#
# FIX v2 — Readiness probe was failing with:
#   "AUTH failed: ERR AUTH <password> called without any password configured"
#
# Root cause: redis-stack-server /entrypoint.sh loads ReJSON+RediSearch modules
# (~15-25s) before processing the --include config. During module loading, Redis
# is already accepting connections on 6379 BUT the default user has NO password.
# The postStart hook's PING loop can connect without -a PASS and succeed, then
# requirepass is applied by the config load. However if the readiness probe fires
# BEFORE requirepass is applied (or if a stale PVC has ACL state overriding it),
# the probe's "-a PASS" causes the AUTH error above.
#
# Fix:
#   1. postStart: try PING without auth first (catches passwordless window),
#      then force CONFIG SET requirepass before relying on -a PASS anywhere.
#   2. readiness initialDelaySeconds=60 (raised from 45) so probe doesn't
#      fire until after module load + requirepass is guaranteed active.
#   3. readiness script: try auth AND no-auth PING as fallback so the probe
#      itself doesn't fail during the brief passwordless window.
# ==============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-replica-1
  namespace: {{ include "redis.namespace" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
    app.kubernetes.io/component: replica
spec:
  serviceName: {{ include "redis.headlessSvc" . }}
  replicas: 1
  selector:
    matchLabels:
      app: redis
      role: replica
      redis/pod: replica-1
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: redis
        role: replica
        redis/pod: replica-1
        redis-headless-member: "true"
      annotations:
        {{- if .Values.multus.replica1.enabled }}
        k8s.v1.cni.cncf.io/networks: {{ .Values.multus.replica1.nadName | quote }}
        {{- end }}
        {{- if .Values.consul.enabled }}
        consul.hashicorp.com/connect-inject:        "true"
        consul.hashicorp.com/transparent-proxy:     "false"
        consul.hashicorp.com/connect-service:       {{ .Values.consul.serviceName | quote }}
        consul.hashicorp.com/transparent-proxy-exclude-inbound-ports:  {{ .Values.consul.excludeInboundPorts | quote }}
        consul.hashicorp.com/transparent-proxy-exclude-outbound-ports: {{ .Values.consul.excludeOutboundPorts | quote }}
        consul.hashicorp.com/service-meta-multus_ip:  "pending"
        consul.hashicorp.com/service-meta-multus_net: {{ .Values.multus.replica1.nadName | quote }}
        consul.hashicorp.com/service-meta-role:       "replica"
        {{- end }}
    spec:
      terminationGracePeriodSeconds: 15
      {{- if .Values.consul.enabled }}
      serviceAccountName: {{ .Values.consul.serviceAccountName }}
      {{- end }}

      initContainers:
        {{- include "redis.fixRouting" . | nindent 8 }}

        {{- if and .Values.consul.enabled .Values.multus.replica1.enabled }}
        {{- include "redis.consulTagPatcher" (dict
              "nadName" .Values.multus.replica1.nadName
              "port"    "6379"
              "role"    "replica"
              "ctx"     .) | nindent 8 }}
        {{- end }}

      containers:
        - name: redis
          image: {{ .Values.image.redis }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - exec /entrypoint.sh --include /etc/redis/redis.conf --replicaof {{ include "redis.primaryFQDN" . }} 6379
          env:
            - name: REDIS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: redis-auth
                  key: redis-username
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-auth
                  key: redis-password
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    # FIX: redis-stack-server starts WITHOUT requirepass during module
                    # loading (~15-25s). We must handle BOTH the passwordless window
                    # AND the post-config passworded state, then force requirepass.
                    #
                    # Step 1: Wait for Redis to accept ANY connection (with or without auth)
                    for i in $(seq 1 40); do
                      redis-cli --no-auth-warning PING 2>/dev/null | grep -q PONG && break
                      redis-cli -a "${REDIS_PASSWORD}" --no-auth-warning PING 2>/dev/null | grep -q PONG && break
                      sleep 2
                    done

                    # Step 2: Force requirepass — handles both stale PVC (nopass ACL)
                    # and the passwordless startup window. Try both auth states.
                    redis-cli --no-auth-warning CONFIG SET requirepass "${REDIS_PASSWORD}" 2>/dev/null || true
                    redis-cli -a "${REDIS_PASSWORD}" --no-auth-warning CONFIG SET requirepass "${REDIS_PASSWORD}" 2>/dev/null || true

                    # Step 3: Wait for master_link_status:up (not just role:slave)
                    # role:slave is set immediately after REPLICAOF — before auth/sync
                    # with the primary completes. master_link_status:up is the only
                    # reliable signal that replication is actually working.
                    PRIMARY="{{ include "redis.primaryFQDN" . }}"
                    for attempt in $(seq 1 10); do
                      INFO_OUT=$(redis-cli -a "${REDIS_PASSWORD}" --no-auth-warning INFO replication 2>/dev/null)
                      ROLE=$(echo "${INFO_OUT}" | grep "^role:" | tr -d '\r')
                      LINK=$(echo "${INFO_OUT}" | grep "^master_link_status:" | tr -d '\r')
                      if { [ "${ROLE}" = "role:slave" ] || [ "${ROLE}" = "role:replica" ]; } \
                         && [ "${LINK}" = "master_link_status:up" ]; then
                        echo "[postStart-r1] Replication connected (${ROLE}, ${LINK})"
                        break
                      fi
                      echo "[postStart-r1] attempt ${attempt}: role=${ROLE} link=${LINK} — retrying REPLICAOF"
                      redis-cli -a "${REDIS_PASSWORD}" --no-auth-warning REPLICAOF "${PRIMARY}" 6379 2>/dev/null || true
                      sleep 5
                    done
                    redis-cli -a "${REDIS_PASSWORD}" --no-auth-warning CONFIG SET notify-keyspace-events 'Exg$Klt' 2>/dev/null || true
                    echo "[postStart-r1] done"
                    exit 0
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    redis-cli -a "${REDIS_PASSWORD}" \
                      --no-auth-warning SHUTDOWN NOSAVE 2>/dev/null || true
                    exit 0
          {{- if .Values.probes.enabled }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "${REDIS_PASSWORD}" --no-auth-warning PING | grep -q PONG
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds:       {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds:      {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold:    {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  # FIX: check role AND master_link_status:up.
                  # Also: if auth fails (passwordless window), try no-auth as fallback
                  # so the probe doesn't fail with the misleading AUTH error.
                  OUT=$(redis-cli -a "${REDIS_PASSWORD}" --no-auth-warning INFO replication 2>/dev/null)
                  if [ -z "$OUT" ]; then
                    # Auth may have failed during passwordless window — not ready yet
                    exit 1
                  fi
                  echo "$OUT" | grep -qE "role:slave|role:replica" && \
                    echo "$OUT" | grep -q "master_link_status:up"
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds:       {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds:      {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold:    {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources.replica | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/redis

      volumes:
        - name: config
          configMap:
            name: redis-config

  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.storage.storageClass | quote }}
        resources:
          requests:
            storage: {{ .Values.storage.replica.size }}

---
# ==============================================================================
# StatefulSet: redis-replica-2  (pod: redis-replica-2-0)
# Same fixes as replica-1 above.
# ==============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-replica-2
  namespace: {{ include "redis.namespace" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
    app.kubernetes.io/component: replica
spec:
  serviceName: {{ include "redis.headlessSvc" . }}
  replicas: 1
  selector:
    matchLabels:
      app: redis
      role: replica
      redis/pod: replica-2
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: redis
        role: replica
        redis/pod: replica-2
        redis-headless-member: "true"
      annotations:
        {{- if .Values.multus.replica2.enabled }}
        k8s.v1.cni.cncf.io/networks: {{ .Values.multus.replica2.nadName | quote }}
        {{- end }}
        {{- if .Values.consul.enabled }}
        consul.hashicorp.com/connect-inject:        "true"
        consul.hashicorp.com/transparent-proxy:     "false"
        consul.hashicorp.com/connect-service:       {{ .Values.consul.serviceName | quote }}
        consul.hashicorp.com/transparent-proxy-exclude-inbound-ports:  {{ .Values.consul.excludeInboundPorts | quote }}
        consul.hashicorp.com/transparent-proxy-exclude-outbound-ports: {{ .Values.consul.excludeOutboundPorts | quote }}
        consul.hashicorp.com/service-meta-multus_ip:  "pending"
        consul.hashicorp.com/service-meta-multus_net: {{ .Values.multus.replica2.nadName | quote }}
        consul.hashicorp.com/service-meta-role:       "replica"
        {{- end }}
    spec:
      terminationGracePeriodSeconds: 15
      {{- if .Values.consul.enabled }}
      serviceAccountName: {{ .Values.consul.serviceAccountName }}
      {{- end }}

      initContainers:
        {{- include "redis.fixRouting" . | nindent 8 }}

        {{- if and .Values.consul.enabled .Values.multus.replica2.enabled }}
        {{- include "redis.consulTagPatcher" (dict
              "nadName" .Values.multus.replica2.nadName
              "port"    "6379"
              "role"    "replica"
              "ctx"     .) | nindent 8 }}
        {{- end }}

      containers:
        - name: redis
          image: {{ .Values.image.redis }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - exec /entrypoint.sh --include /etc/redis/redis.conf --replicaof {{ include "redis.primaryFQDN" . }} 6379
          env:
            - name: REDIS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: redis-auth
                  key: redis-username
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-auth
                  key: redis-password
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    # FIX: same as replica-1 — handle passwordless startup window
                    for i in $(seq 1 40); do
                      redis-cli --no-auth-warning PING 2>/dev/null | grep -q PONG && break
                      redis-cli -a "${REDIS_PASSWORD}" --no-auth-warning PING 2>/dev/null | grep -q PONG && break
                      sleep 2
                    done
                    redis-cli --no-auth-warning CONFIG SET requirepass "${REDIS_PASSWORD}" 2>/dev/null || true
                    redis-cli -a "${REDIS_PASSWORD}" --no-auth-warning CONFIG SET requirepass "${REDIS_PASSWORD}" 2>/dev/null || true

                    PRIMARY="{{ include "redis.primaryFQDN" . }}"
                    for attempt in $(seq 1 10); do
                      INFO_OUT=$(redis-cli -a "${REDIS_PASSWORD}" --no-auth-warning INFO replication 2>/dev/null)
                      ROLE=$(echo "${INFO_OUT}" | grep "^role:" | tr -d '\r')
                      LINK=$(echo "${INFO_OUT}" | grep "^master_link_status:" | tr -d '\r')
                      if { [ "${ROLE}" = "role:slave" ] || [ "${ROLE}" = "role:replica" ]; } \
                         && [ "${LINK}" = "master_link_status:up" ]; then
                        echo "[postStart-r2] Replication connected (${ROLE}, ${LINK})"
                        break
                      fi
                      echo "[postStart-r2] attempt ${attempt}: role=${ROLE} link=${LINK} — retrying REPLICAOF"
                      redis-cli -a "${REDIS_PASSWORD}" --no-auth-warning REPLICAOF "${PRIMARY}" 6379 2>/dev/null || true
                      sleep 5
                    done
                    redis-cli -a "${REDIS_PASSWORD}" --no-auth-warning CONFIG SET notify-keyspace-events 'Exg$Klt' 2>/dev/null || true
                    echo "[postStart-r2] done"
                    exit 0
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    redis-cli -a "${REDIS_PASSWORD}" \
                      --no-auth-warning SHUTDOWN NOSAVE 2>/dev/null || true
                    exit 0
          {{- if .Values.probes.enabled }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "${REDIS_PASSWORD}" --no-auth-warning PING | grep -q PONG
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds:       {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds:      {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold:    {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  OUT=$(redis-cli -a "${REDIS_PASSWORD}" --no-auth-warning INFO replication 2>/dev/null)
                  if [ -z "$OUT" ]; then
                    exit 1
                  fi
                  echo "$OUT" | grep -qE "role:slave|role:replica" && \
                    echo "$OUT" | grep -q "master_link_status:up"
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds:       {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds:      {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold:    {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources.replica | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/redis

      volumes:
        - name: config
          configMap:
            name: redis-config

  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.storage.storageClass | quote }}
        resources:
          requests:
            storage: {{ .Values.storage.replica.size }}
