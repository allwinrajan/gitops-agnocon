{{- if .Values.consul.enabled }}
---
# ==============================================================================
# Pre-delete Job: redis-consul-deregister
#
# Runs BEFORE pods are deleted on helm uninstall.
# Deregisters all Redis service instances from Consul so stale entries
# do not remain in the service catalog after the pods are gone.
#
# Uses the Consul HTTP API directly (not Envoy sidecar) because by the time
# this job runs the pods may already be terminating.
#
# The Consul agent URL is the server endpoint — works without local agents.
# SSL verification is disabled (self-signed certs common in telecom clusters).
#
# hook-weight: -5 — runs before any other pre-delete hooks.
# hook-delete-policy: before-hook-creation — cleans up previous failed runs.
# ttlSecondsAfterFinished: 60 — job pods cleaned up 60s after completion.
# ==============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: redis-consul-deregister
  namespace: {{ include "redis.namespace" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook":               pre-delete
    "helm.sh/hook-weight":        "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 60
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ .Values.consul.serviceAccountName }}
      containers:
        - name: consul-deregister
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: CONSUL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: redis-auth
                  key: redis-password
            - name: CONSUL_URL
              value: {{ .Values.consul.url | quote }}
            - name: CONSUL_SERVICE_NAME
              value: {{ .Values.consul.serviceName | quote }}
          command:
            - python3
            - -u
            - -c
            - |
              import json, os, ssl, sys, urllib.request, urllib.error

              def log(msg): print(f"[consul-deregister] {msg}", flush=True)

              consul_token = os.environ["CONSUL_TOKEN"]
              consul_url   = os.environ["CONSUL_URL"].rstrip("/")
              svc_name     = os.environ["CONSUL_SERVICE_NAME"]

              ssl_ctx = ssl.create_default_context()
              ssl_ctx.check_hostname = False
              ssl_ctx.verify_mode    = ssl.CERT_NONE

              # All service instance IDs registered by Envoy sidecar.
              # Consul Connect names them: <serviceName>-<podName>
              service_ids = [
                  f"{svc_name}-redis-primary-0",
                  f"{svc_name}-redis-replica-1-0",
                  f"{svc_name}-redis-replica-2-0",
              ]

              # First try to list actual registered instances to catch any
              # dynamically-named IDs (e.g. if Consul assigned a different ID).
              try:
                  list_url = f"{consul_url}/v1/catalog/service/{svc_name}"
                  req = urllib.request.Request(list_url,
                      headers={"X-Consul-Token": consul_token})
                  with urllib.request.urlopen(req, context=ssl_ctx, timeout=10) as r:
                      instances = json.loads(r.read())
                      dynamic_ids = [i["ServiceID"] for i in instances]
                      if dynamic_ids:
                          log(f"Found registered instance IDs: {dynamic_ids}")
                          # Merge dynamic IDs with static list (deduplicated)
                          service_ids = list(set(service_ids + dynamic_ids))
              except Exception as e:
                  log(f"Could not list instances (using static IDs): {e}")

              for svc_id in service_ids:
                  log(f"Deregistering: {svc_id}")
                  url = f"{consul_url}/v1/agent/service/deregister/{svc_id}"
                  req = urllib.request.Request(url, method="PUT",
                      headers={"X-Consul-Token": consul_token})
                  try:
                      with urllib.request.urlopen(req, context=ssl_ctx, timeout=10) as r:
                          log(f"  OK (HTTP {r.status})")
                  except urllib.error.HTTPError as e:
                      if e.code == 404:
                          log(f"  Already gone (HTTP 404) — skipping")
                      else:
                          log(f"  HTTP {e.code}: {e.read().decode()[:200]}")
                  except Exception as e:
                      log(f"  Error: {e}")

              log("Deregistration complete.")
              sys.exit(0)
{{- end }}
