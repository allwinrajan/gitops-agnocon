# redis-service — values-production.yaml
# ─────────────────────────────────────────────────────────────────────────────
# TARGET CLUSTER: 2 nodes × 1 CPU × 2.4 GB RAM each
#
# FIX v4: Redis replica readiness probe still failing (empty failure message).
#
# ROOT CAUSE:
#   The probe failure message is EMPTY ("Readiness probe failed:" with nothing
#   after it). This means the INFO replication command returns empty output —
#   i.e., the redis-cli call itself fails (connection refused or timeout),
#   NOT an auth error. The replica is still in the module-loading phase
#   (ReJSON + RediSearch each ~10-15s on 300m CPU = 20-30s total) when the
#   probe fires at 60s after container start.
#
#   Timeline on 300m CPU:
#     0s    — container starts, entrypoint.sh begins
#     0-30s — redis-stack-server loads ReJSON + RediSearch modules
#     30s   — Redis starts accepting connections
#     30-45s — REPLICAOF command connects to primary, begins sync
#     45-90s — initial bulk sync (depends on primary data size)
#     90s+  — master_link_status:up (replication actually working)
#
#   With readiness.initialDelaySeconds=60, first probe fires at ~60s.
#   If modules haven't finished loading, redis-cli gets connection refused
#   → OUT is empty → exit 1. This loops for 6×10s=60s more = 120s total.
#   But replication sync can take longer than 120s on a slow node.
#
# FIX:
#   readiness.initialDelaySeconds: 60 → 90s (covers module load + connect)
#   readiness.failureThreshold: 6 → 12 (12×10s = 120s grace after delay)
#   Total budget: 90 + 120 = 210s = 3.5 min before pod marked unhealthy.
#   This comfortably covers module load + initial sync on 300m CPU.
#
# ─────────────────────────────────────────────────────────────────────────────

namespace: redis

image:
  redis: "redis/redis-stack-server:7.2.0-v10"
  pullPolicy: IfNotPresent

auth:
  enabled: true
  username: "admin"
  password: "Admin@123"

redis:
  notifyKeyspaceEvents: "ExgKlt"
  appendonly: "yes"
  appendfsync: "everysec"
  maxmemory: "48mb"
  maxmemoryPolicy: "allkeys-lru"
  tcpKeepalive: 30
  hz: 10
  pubsubClientOutputBufferLimit: "pubsub 8388608 4194304 60"
  extraConfig: ""

sentinel:
  replicas: 3
  port: 26379
  masterName: "mymaster"
  quorum: 2
  downAfterMs: 5000
  failoverTimeout: 30000
  parallelSyncs: 1

multus:
  primary:
    enabled: false
    nadName: "macvlan-redis-primary"
  replica1:
    enabled: false
    nadName: "macvlan-redis-replica1"
  replica2:
    enabled: false
    nadName: "macvlan-redis-replica2"
  sentinel:
    enabled: false
    nadName: ""

consul:
  enabled: false
  url: "https://consul-server.consul.svc.cluster.local:8501"
  token: "693c91b6-88d9-87b2-3331-e6025c8f2cb8"
  serviceName: "redis-service"
  serviceAccountName: "redis-service"
  zone: "ZONE-1"
  excludeInboundPorts:  "6379,26379"
  excludeOutboundPorts: "6379,26379"

storage:
  storageClass: "local-path"
  primary:
    size: "1Gi"
  replica:
    size: "1Gi"

resources:
  primary:
    requests:
      cpu: "50m"
      memory: "150Mi"
    limits:
      cpu: "400m"
      memory: "256Mi"
  replica:
    requests:
      cpu: "50m"
      memory: "150Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"
  sentinel:
    requests:
      cpu: "10m"
      memory: "24Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"

# FIX v4:
#   readiness.initialDelaySeconds: 90s (was 60s)
#     — covers redis-stack-server module load time on 300m CPU (~30s),
#       plus REPLICAOF connect + initial bulk sync (~30-60s).
#   readiness.failureThreshold: 12 (was 6)
#     — 12 × 10s = 120s grace after delay = 210s total budget.
#     — Handles slow initial bulk sync on constrained hardware.
#   liveness.initialDelaySeconds: 30s — just PING, very safe.
probes:
  enabled: true
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 5
  readiness:
    initialDelaySeconds: 90    # was 60 — raised to cover module load + sync
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 12       # was 6 — 120s extra grace after delay
