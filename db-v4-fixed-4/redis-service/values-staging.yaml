# redis-service — values-staging.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Production-grade spec — Guaranteed QoS, Multus MacVLAN, Consul Connect.
# For large nodes: ≥4 CPU, ≥8 GB RAM per node.
#
# Deploy:
#   helm upgrade --install redis-service . -n redis -f values-staging.yaml
# ─────────────────────────────────────────────────────────────────────────────

namespace: redis

image:
  redis: "redis/redis-stack-server:7.2.0-v10"
  pullPolicy: IfNotPresent

auth:
  enabled: true
  username: "admin"
  password: "Admin@123"

redis:
  notifyKeyspaceEvents: "ExgKlt"
  appendonly: "yes"
  appendfsync: "everysec"
  maxmemory: "200mb"
  maxmemoryPolicy: "allkeys-lru"
  tcpKeepalive: 30
  hz: 15
  pubsubClientOutputBufferLimit: "pubsub 67108864 33554432 60"
  extraConfig: ""

sentinel:
  replicas: 3
  port: 26379
  masterName: "mymaster"
  quorum: 2
  downAfterMs: 5000
  failoverTimeout: 10000
  parallelSyncs: 1

# Multus: enabled — primary gets MacVLAN LAN IP
multus:
  primary:
    enabled: true
    nadName: "macvlan-redis-primary"
  replica1:
    enabled: false
    nadName: "macvlan-redis-replica1"
  replica2:
    enabled: false
    nadName: "macvlan-redis-replica2"
  sentinel:
    enabled: false
    nadName: ""

# Consul: enabled
consul:
  enabled: true
  url: "https://consul-server.consul.svc.cluster.local:8501"
  token: "693c91b6-88d9-87b2-3331-e6025c8f2cb8"
  serviceName: "redis-service"
  serviceAccountName: "redis-service"
  zone: "ZONE-1"
  excludeInboundPorts:  "6379,26379"
  excludeOutboundPorts: "6379,26379"

storage:
  storageClass: "longhorn-redis"
  primary:
    size: "15Gi"
  replica:
    size: "10Gi"

# Guaranteed QoS — request = limit
resources:
  primary:
    requests:
      cpu: "2000m"
      memory: "3Gi"
    limits:
      cpu: "2000m"
      memory: "3Gi"
  replica:
    requests:
      cpu: "1000m"
      memory: "2Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
  sentinel:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

probes:
  enabled: true
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 5
  readiness:
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
