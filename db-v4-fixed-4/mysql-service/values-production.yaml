# mysql-service — values-production.yaml
# ─────────────────────────────────────────────────────────────────────────────
# TARGET CLUSTER: 2 nodes × 1 CPU × 2.4 GB RAM each
#
# FIX v4: Secondary pods being killed by liveness probe (DisruptionTarget).
#
# ROOT CAUSE:
#   liveness probe delay=420s + failureThreshold=6 × period=20s = 540s (~9 min).
#   MySQL Group Replication on a 1-vCPU node can take 8-12 minutes for
#   secondaries to reach MEMBER_STATE=ONLINE (init + primary wait + GR join).
#   The liveness probe killed the secondary at ~9 min before GR completed.
#   The PodDisruptionBudget (minAvailable=2) then blocked termination, causing
#   "Terminating (lasts 17m)" with DisruptionTarget=True.
#
# FIX:
#   1. LIVENESS DISABLED on secondary pods. Liveness is dangerous for GR
#      secondaries — a pod mid-join looks "dead" but is actually working.
#      Readiness (which also checks MEMBER_STATE=ONLINE after grace period)
#      is sufficient to gate traffic. Liveness kept on PRIMARY only.
#      → Disabled via probes.liveness.enabled: false
#
#   2. Readiness initialDelaySeconds: 240s → 300s (5 min). Gives the full
#      init + primary-wait + GR-join cycle time to complete before probing.
#      Grace period in readiness.sh adds 360s more. Total budget: 300 + (8×15)
#      = 420s before pod is marked unhealthy.
#
#   3. PDB: Already correct (minAvailable=2). No change needed.
#
# ─────────────────────────────────────────────────────────────────────────────

image:
  repository: mysql
  tag: "8.0.36"
  pullPolicy: IfNotPresent

namespace: "mysql-cluster"

rootPassword: "root"

users:
  - name: "appuser"
    password: "App@1234"
  - name: "dbadmin"
    password: "Dba@5678"

multus:
  enabled: false
  networkAttachmentDefinition: macvlan-mysql-primary

groupReplication:
  groupName: "aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee"
  groupPort: 33061
  messageCacheSize: "32M"   # default is 1GiB — far above this lab's 900Mi container limit

storage:
  size: "2Gi"
  storageClass: "local-path"

resources:
  primary:
    requests:
      cpu: "150m"
      memory: "600Mi"
    limits:
      cpu: "800m"
      memory: "1024Mi"
  secondary:
    requests:
      cpu: "150m"
      memory: "600Mi"
    limits:
      cpu: "600m"
      memory: "1024Mi"

mysqlPort: 3306

mysqlConfig:
  maxConnections: 30
  innodbBufferPoolSize: "96M"
  performanceSchemaConsumersOnlyGR: true
  tableOpenCache: 64
  threadCacheSize: 4

consul:
  enabled: false
  url: "https://consul-server.consul.svc.cluster.local:8501"
  token: "693c91b6-88d9-87b2-3331-e6025c8f2cb8"
  serviceName: "mysql-service"
  serviceAccountName: "mysql-service"
  zone: "ZONE-1"
  excludeInboundPorts:  "3306,33061"
  excludeOutboundPorts: "3306,33061"

# FIX v4:
#   liveness.enabled: false — liveness was killing secondaries at ~9min before
#   GR could complete. On 1 vCPU, GR join takes 8-12 min. Readiness alone is
#   sufficient to gate traffic. Liveness can be re-enabled after GR is stable.
#
#   readiness.initialDelaySeconds: 300s (5 min) — covers full secondary startup:
#     ~30s  init container
#     ~60s  mysqld start + initialization
#     ~200s bootstrap.sh primary wait (40×5s) + GR join retries
#     = ~5 min realistic worst-case on this hardware
#   failureThreshold=8 × period=15s = 120s additional grace after delay.
probes:
  liveness:
    enabled: false       # DISABLED — was killing secondaries mid-GR-join
    initialDelaySeconds: 600
    periodSeconds: 20
    timeoutSeconds: 10
    failureThreshold: 6
  readiness:
    enabled: true
    initialDelaySeconds: 300   # 5 min: covers full secondary GR join cycle
    periodSeconds: 15
    timeoutSeconds: 10
    failureThreshold: 8
