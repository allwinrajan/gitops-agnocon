# mysql-service — values-staging.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Production-grade spec — Guaranteed QoS, Multus MacVLAN, Consul Connect.
# For large nodes: ≥4 CPU, ≥8 GB RAM per node (telecom production cluster).
#
# Deploy:
#   helm upgrade --install mysql-service . -n mysql-cluster -f values-staging.yaml
# ─────────────────────────────────────────────────────────────────────────────

image:
  repository: mysql
  tag: "8.0.36"
  pullPolicy: IfNotPresent

namespace: "mysql-cluster"

rootPassword: "root"

users:
  - name: "appuser"
    password: "App@1234"
  - name: "dbadmin"
    password: "Dba@5678"

# Multus: enabled — primary gets MacVLAN LAN IP for external routing
multus:
  enabled: true
  networkAttachmentDefinition: macvlan-mysql-primary

groupReplication:
  groupName: "aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee"
  groupPort: 33061
  messageCacheSize: "256M"

storage:
  size: "15Gi"
  storageClass: "longhorn-mysql"

# Guaranteed QoS — request = limit for deterministic latency
resources:
  primary:
    requests:
      cpu: "1000m"
      memory: "2Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
  secondary:
    requests:
      cpu: "1000m"
      memory: "2Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"

mysqlPort: 3306

mysqlConfig:
  maxConnections: 500
  innodbBufferPoolSize: "512M"
  performanceSchemaConsumersOnlyGR: false   # plenty of RAM headroom on prod-grade nodes
  tableOpenCache: 4000                       # MySQL default — fine at 2Gi/pod
  threadCacheSize: 32

# Consul: enabled — Envoy sidecar + consul-tag-patcher
consul:
  enabled: true
  url: "https://consul-server.consul.svc.cluster.local:8501"
  token: "693c91b6-88d9-87b2-3331-e6025c8f2cb8"
  serviceName: "mysql-service"
  serviceAccountName: "mysql-service"
  zone: "ZONE-1"
  excludeInboundPorts:  "3306,33061"
  excludeOutboundPorts: "3306,33061"

probes:
  liveness:
    enabled: true
    initialDelaySeconds: 120
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 5
  readiness:
    enabled: true
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
